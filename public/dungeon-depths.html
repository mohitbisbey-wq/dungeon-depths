// ── Utilities ─────────────────────────────────────────────────────────────────
function ov(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function rng(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function sec(){return performance.now()/1000;}

function txt(str,x,y,col='#fff',scale=1){
  str=String(str).toUpperCase();
  let ox=x;
  for(const ch of str){
    const g=FONT[ch]||FONT[' '];
    for(let r=0;r<g.length;r++)
      for(let c=0;c<g[r].length;c++)
        if(g[r][c]){cx.fillStyle=col;cx.fillRect(ox+c*scale,y+r*scale,scale,scale);}
    ox+=(g[0].length+1)*scale;
  }
}
function txtW(str,scale=1){
  let w=0;
  for(const ch of String(str).toUpperCase()){const g=FONT[ch]||FONT[' '];w+=(g[0].length+1)*scale;}
  return w-scale;
}
function txtC(str,y,col,scale=1){txt(str,Math.round((W-txtW(str,scale))/2),y,col,scale);}

function pickUpgrades(){
  const wPool=run.weapon?UPGRADE_POOL[run.weapon]:[];
  const combined=[...UPGRADE_POOL.universal,...wPool].filter(u=>!has(u.id));
  const out=[];
  while(out.length<3&&combined.length>0){
    const i=Math.floor(Math.random()*combined.length);
    out.push(combined.splice(i,1)[0]);
  }
  return out;
}

// ── Enemy instances ────────────────────────────────────────────────────────────
let enemies=[];
function spawnEnemies(roomDef,themeIdx){
  enemies=[];
  if(roomDef.enemyCount===0)return;
  const types=ENEMY_TYPES_BY_THEME[themeIdx];
  const plats=roomDef.plats.filter(pl=>pl[1]<220); // non-floor plats
  for(let i=0;i<roomDef.enemyCount;i++){
    const plat=pick(plats.length?plats:roomDef.plats);
    enemies.push({
      x:plat[0]+plat[2]/2,y:plat[1]-14,
      vx:pick([-0.5,0.5]),vy:0,
      w:10,h:14,hp:2,
      type:pick(types),
      platX:plat[0],platRight:plat[0]+plat[2],
      onGround:false,
      stunTimer:0,
      dropCoins:pick([1,1,1,2]),
    });
  }
}

// ── Game state machine ────────────────────────────────────────────────────────
// States: MENU, RUN, TRANSITION, UPGRADE_PICK, SHOP_SCREEN, BOSS, GAME_OVER, WIN
let STATE='MENU';
let prevState='MENU';
let transitionAlpha=0;
let transitionDir=1; // 1=fade out, -1=fade in
let transitionCallback=null;
function fadeTo(cb){
  STATE='TRANSITION';transitionAlpha=0;transitionDir=1;transitionCallback=cb;
}

let currentRoom=null;
let roomEnemiesCleared=false;
let upgradeChoices=[];
let upgradeSelected=0;
let shopItems=[];
let shopSelected=0;

function loadRoom(roomDef){
  currentRoom=roomDef;
  exitOpen=false;
  exitX=roomDef.exit[0];exitY=roomDef.exit[1];
  drops=[];particles=[];projectiles=[];bossEntity=null;cameraX=0;
  resetPlayer(roomDef.spawn[0],roomDef.spawn[1]);
  spawnEnemies(roomDef,run.themeIdx);
  roomEnemiesCleared=(roomDef.enemyCount===0);
  if(roomEnemiesCleared)exitOpen=true;
  if(has('shield'))p.shieldUp=true;
}

function advanceTheme(){
  run.themeIdx++;
  run.roomIdx=0;
  if(run.themeIdx>=THEMES.length){fadeTo(()=>{STATE='WIN';});return;}
  if(run.weapon===null){
    // first theme done — pick a weapon before entering next world
    fadeTo(()=>{weaponChoices=WEAPONS;weaponSelected=0;STATE='WEAPON_PICK';});
    return;
  }
  const themeKey=THEME_KEYS[run.themeIdx];
  const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
  fadeTo(()=>{loadRoom(def);STATE='RUN';});
}

function nextRoom(){
  run.depth++;
  run.roomIdx++;
  const themeKey=THEME_KEYS[run.themeIdx];
  if(run.roomIdx===3){
    buildShop();fadeTo(()=>{STATE='SHOP_SCREEN';});return;
  }
  if(run.roomIdx===4){
    const br=BOSS_ROOMS[themeKey];
    fadeTo(()=>{loadRoom(br);spawnBoss(run.themeIdx);STATE='RUN';});return;
  }
  if(run.roomIdx>=5){advanceTheme();return;}
  const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
  fadeTo(()=>{loadRoom(def);STATE='RUN';});
}

function buildShop(){
  shopItems=[
    {id:'heal',    name:'HEAL POTION', desc:'+2 HP',        cost:4},
    {id:'upgrade', name:'UPGRADE PICK',desc:'Choose 1 upgrade',cost:6},
    {id:'maxhp',   name:'IRON HEART',  desc:'Max HP +1',    cost:8},
  ];
  shopSelected=0;
}

// ── Physics step ──────────────────────────────────────────────────────────────
const GRAV=0.4,MAX_VY=8;
function physStep(obj,plats){
  obj.vy=Math.min(obj.vy+GRAV,MAX_VY);
  obj.x+=obj.vx;
  obj.y+=obj.vy;
  obj.onGround=false;
  for(const [px,py,pw,ph] of plats){
    if(ov(obj.x,obj.y,obj.w||PW,obj.h||PH,px,py,pw,ph)){
      const ox=(obj.x+(obj.w||PW)/2)-(px+pw/2);
      const oy=(obj.y+(obj.h||PH)/2)-(py+ph/2);
      const overX=(obj.w||PW)/2+pw/2-Math.abs(ox);
      const overY=(obj.h||PH)/2+ph/2-Math.abs(oy);
      if(overX<overY){
        obj.x+=ox>0?overX:-overX;obj.vx=0;
      } else {
        obj.y+=oy>0?overY:-overY;
        if(oy<0){obj.onGround=true;obj.vy=0;}
        else obj.vy=0;
      }
    }
  }
  obj.x=clamp(obj.x,0,(currentRoom?currentRoom.w||W:W)-(obj.w||PW));
}

function spawnBoss(themeIdx){
  bossEntity=null;
  if(themeIdx!==0)return; // only grasslands has a special boss for now
  bossEntity={
    x:306,y:200,vx:1.3,vy:0,
    w:28,h:20,hp:8,maxHp:8,
    onGround:false,jumpTimer:150,
    spawnedMinions:false,iframes:0,
  };
}

function updateBoss(){
  if(!bossEntity)return;
  const b=bossEntity;
  if(b.iframes>0)b.iframes--;
  const roomW=currentRoom.w||W;
  const rage=b.hp<=b.maxHp/2;
  const spd=rage?2.2:1.3;

  // patrol and bounce off room edges
  if(b.onGround)b.vx=Math.sign(b.vx||1)*spd;
  if(b.x<=0)b.vx=Math.abs(b.vx);
  if(b.x+b.w>=roomW)b.vx=-Math.abs(b.vx);

  // periodic jumps toward player
  b.jumpTimer--;
  if(b.jumpTimer<=0&&b.onGround){
    b.vy=-7;
    b.vx=(p.x>b.x?1:-1)*spd;
    b.jumpTimer=rage?80+Math.floor(rng(0,80)):120+Math.floor(rng(0,120));
  }

  physStep(b,currentRoom.plats);

  // spawn minions at half HP
  if(rage&&!b.spawnedMinions){
    b.spawnedMinions=true;
    for(const ox of [-24,b.w+8]){
      enemies.push({x:b.x+ox,y:b.y,vx:ox<0?-0.6:0.6,vy:0,
        w:10,h:14,hp:2,type:'slime',
        platX:0,platRight:roomW,
        onGround:false,stunTimer:0,dropCoins:1});
    }
    burst(b.x+b.w/2,b.y,'#4f4',16);
  }

  // stomp hit
  if(p.stomping&&p.vy>0&&b.iframes===0&&ov(p.x,p.y,PW,PH,b.x,b.y,b.w,b.h)){
    b.hp--;b.iframes=35;
    p.vy=-6.5;p.iframes=20;
    burst(b.x+b.w/2,b.y,'#4f4',10);
    if(b.hp<=0){
      spawnDrops(b.x+b.w/2,b.y,6);
      spawnShard(b.x+b.w/2,b.y);spawnShard(b.x+b.w/2,b.y);
      burst(b.x+b.w/2,b.y,'#ffd700',24);
      bossEntity=null;exitOpen=true;roomEnemiesCleared=true;
    }
    return;
  }

  // contact damage
  if(ov(p.x,p.y,PW,PH,b.x,b.y,b.w,b.h)&&p.iframes===0){
    if(p.shieldUp){p.shieldUp=false;}
    else{run.hp--;p.iframes=60;burst(p.x+PW/2,p.y+PH/2,'#f44',10);}
    if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});}
  }
}

const DASH_SPEED=11,DASH_DUR=12;
const BASE_ATK_CD=20,CROSSBOW_ATK_CD=35,TOME_ATK_CD=30;

function daggerHit(){
  const sx=p.facingR?p.x+PW:p.x-14;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(ov(sx,p.y,14,PH,e.x,e.y,e.w,e.h)){
      const dmg=has('stomp_dmg')?2:1;
      e.hp-=dmg;
      burst(e.x+e.w/2,e.y+e.h/2,'#4fc3f7',6);
      if(e.hp<=0){
        spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
        if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
        if(has('regen')&&run.hp<run.maxHp)run.hp++;
        burst(e.x+e.w/2,e.y,'#4fc3f7',10);
        enemies.splice(i,1);
      }
    }
  }
}

function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    const proj=projectiles[i];
    proj.x+=proj.vx;proj.y+=proj.vy;
    proj.life--;
    if(proj.x<0||proj.x>W||proj.y<0||proj.y>H||proj.life<=0){
      projectiles.splice(i,1);continue;
    }
    let dead=false;
    for(const [px,py,pw,ph] of currentRoom.plats){
      if(ov(proj.x,proj.y,4,3,px,py,pw,ph)){dead=true;break;}
    }
    if(dead){projectiles.splice(i,1);continue;}
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(ov(proj.x,proj.y,4,3,e.x,e.y,e.w,e.h)){
        e.hp--;
        burst(e.x+e.w/2,e.y+e.h/2,'#ffd700',6);
        if(e.hp<=0){
          spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
          if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
          if(has('regen')&&run.hp<run.maxHp)run.hp++;
          burst(e.x+e.w/2,e.y,'#ffd700',10);
          enemies.splice(j,1);
        }
        if(!proj.pierce){dead=true;break;}
      }
    }
    if(dead)projectiles.splice(i,1);
  }
}

function updatePlayer(){
  if(p.dashCd>0)p.dashCd--;
  if(p.atkCd>0)p.atkCd--;
  if(p.atkTimer>0)p.atkTimer--;
  if(p.dashTimer>0){
    p.dashTimer--;
    p.vx=DASH_SPEED*p.dashDirX;p.vy=DASH_SPEED*p.dashDirY;
    physStep(p,currentRoom.plats);
    return;
  }
  const left=pressed('ArrowLeft')||pressed('KeyA');
  const right=pressed('ArrowRight')||pressed('KeyD');
  const up=pressed('ArrowUp')||pressed('KeyW');
  const down=pressed('ArrowDown')||pressed('KeyS');
  const jump=up||pressed('Space');
  const dashKey=pressed('ShiftLeft')||pressed('ShiftRight');
  const atkKey=pressed('KeyZ')||pressed('KeyX');

  const spd=has('dash_cd')?2.4:2;
  if(left){p.vx=lerp(p.vx,-spd,0.3);p.facingR=false;}
  else if(right){p.vx=lerp(p.vx,spd,0.3);p.facingR=true;}
  else p.vx=lerp(p.vx,0,0.25);

  if(p.onGround)p.jumpsLeft=has('dbl_jump')?2:1;

  if(jump&&p.jumpsLeft>0&&!keys['_jHeld']){
    p.vy=-6.5;p.jumpsLeft--;keys['_jHeld']=true;
  }
  if(!jump)keys['_jHeld']=false;

  // weapon attack (Z/X)
  if(atkKey&&p.atkCd===0&&run.weapon){
    const cdMult=has('fast_blade')||has('reload_cd')?0.6:1;
    if(run.weapon==='dagger'){
      p.atkTimer=8;p.atkCd=Math.round(BASE_ATK_CD*cdMult);
      daggerHit();
    } else if(run.weapon==='crossbow'){
      p.atkCd=Math.round(CROSSBOW_ATK_CD*cdMult);
      const dir=p.facingR?1:-1;
      const angles=has('multi_shot')?[-0.25,0,0.25]:[0];
      for(const ang of angles){
        projectiles.push({x:p.x+PW/2,y:p.y+PH/2,
          vx:dir*5*Math.cos(ang),vy:5*Math.sin(ang),
          pierce:has('pierce'),life:80});
      }
      burst(p.x+(p.facingR?PW:0),p.y+PH/2,'#ffd700',5);
    } else if(run.weapon==='tome'){
      p.atkTimer=14;p.atkCd=Math.round(TOME_ATK_CD*cdMult);
      const radius=has('blast_aoe')?80:50;
      const dmg=has('stomp_dmg')?2:1;
      burst(p.x+PW/2,p.y+PH/2,'#e040fb',20);
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        const dx=(e.x+e.w/2)-(p.x+PW/2),dy=(e.y+e.h/2)-(p.y+PH/2);
        if(Math.sqrt(dx*dx+dy*dy)<radius){
          e.hp-=dmg;
          if(has('area_stomp'))e.stunTimer=60;
          burst(e.x+e.w/2,e.y+e.h/2,'#e040fb',6);
          if(e.hp<=0){
            spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
            if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
            if(has('regen')&&run.hp<run.maxHp)run.hp++;
            burst(e.x+e.w/2,e.y,'#e040fb',10);
            enemies.splice(i,1);
          }
        }
      }
    }
  }

  // dash — only unlocked after weapon pick
  if(dashKey&&p.dashCd===0&&run.weapon!==null){
    const cd=has('dash_cd')?Math.round(BASE_DASH_CD*0.7):BASE_DASH_CD;
    p.dashTimer=DASH_DUR;p.dashCd=cd;
    let dx=(right?1:0)-(left?1:0);
    let dy=(down?1:0)-(up?1:0);
    if(dx===0&&dy===0)dx=p.facingR?1:-1;
    const len=Math.sqrt(dx*dx+dy*dy);
    p.dashDirX=dx/len;p.dashDirY=dy/len;
    p.vx=DASH_SPEED*p.dashDirX;p.vy=DASH_SPEED*p.dashDirY;
    burst(p.x+PW/2,p.y+PH/2,'#aaf',12);
  }

  physStep(p,currentRoom.plats);

  // stomp
  if(!p.onGround&&p.vy>1)p.stomping=true;
  if(p.onGround)p.stomping=false;

  if(p.iframes>0)p.iframes--;
}

function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.stunTimer>0){e.stunTimer--;continue;}
    e.vx=clamp(e.vx,-1,1);
    if(e.x<=e.platX){e.vx=Math.abs(e.vx);}
    if(e.x+e.w>=e.platRight){e.vx=-Math.abs(e.vx);}
    physStep(e,currentRoom.plats);

    // dash strike (dagger upgrade)
    if(has('dash_strike')&&p.dashTimer>0&&p.iframes===0){
      if(ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)){
        e.hp--;p.iframes=10;
        burst(e.x+e.w/2,e.y+e.h/2,'#aaf',6);
        if(e.hp<=0){
          spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
          if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
          if(has('regen')&&run.hp<run.maxHp)run.hp++;
          burst(e.x+e.w/2,e.y,'#aaf',10);
          enemies.splice(i,1);
        }
        continue;
      }
    }

    // stomp kill
    if(p.stomping&&ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)&&p.vy>0){
      const dmg=has('stomp_dmg')?2:1;
      e.hp-=dmg;p.vy=-4;p.iframes=20;
      burst(e.x+e.w/2,e.y,'#f84',8);
      if(has('area_stomp')){
        for(const other of enemies){
          if(other!==e&&Math.abs(other.x-e.x)<50)other.stunTimer=60;
        }
      }
      if(e.hp<=0){
        spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
        if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
        if(has('regen')&&run.hp<run.maxHp)run.hp++;
        burst(e.x+e.w/2,e.y,'#f84',12);
        enemies.splice(i,1);
      }
      continue;
    }

    // player damage
    if(ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)&&p.iframes===0){
      if(p.shieldUp){p.shieldUp=false;}
      else{run.hp--;p.iframes=60;burst(p.x+PW/2,p.y+PH/2,'#f44',10);}
      if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});return;}
    }
  }
  if(enemies.length===0&&!roomEnemiesCleared){
    roomEnemiesCleared=true;exitOpen=true;
    // room-clear chest: always drop a shard
    spawnShard(exitX-20,exitY-8);
    burst(exitX,exitY,'#ff0',12);
  }
}

function updateDrops(){
  const magnet=has('coin_mag');
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(d.collected)continue;
    d.vy=Math.min(d.vy+GRAV,MAX_VY);
    if(magnet){
      const dx=(p.x+PW/2)-(d.x);
      const dy=(p.y+PH/2)-(d.y);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<60){d.vx+=dx/dist*0.5;d.vy+=dy/dist*0.5;}
    }
    d.x+=d.vx;d.y+=d.vy;
    for(const [px,py,pw,ph] of currentRoom.plats){
      if(ov(d.x,d.y,4,4,px,py,pw,ph)){d.vy=0;d.vx*=0.8;d.y=py-4;}
    }
    d.x=clamp(d.x,0,W-4);
    if(ov(p.x-4,p.y-4,PW+8,PH+8,d.x,d.y,4,4)){
      if(d.type==='coin')run.coins++;
      else run.shards++;
      burst(d.x,d.y,d.type==='coin'?'#ff0':'#e040fb',4);
      drops.splice(i,1);
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;pt.life-=0.04;
    if(pt.life<=0)particles.splice(i,1);
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawBg(theme){
  cx.fillStyle=theme.sky;cx.fillRect(0,0,W,H);
  // Celeste-style layered dither: two depths, offset scroll feel
  cx.fillStyle=theme.mid;
  for(let x=0;x<W;x+=2)for(let y=80;y<H;y+=2){
    if((x^y)&2&&Math.sin(x*0.3+y*0.2)>0.3)cx.fillRect(x,y,1,1);
  }
  // subtle scanline grain
  cx.fillStyle='rgba(0,0,0,0.08)';
  for(let y=0;y<H;y+=2)cx.fillRect(0,y,W,1);
}

function drawPlats(plats,theme){
  for(const [x,y,w,h] of plats){
    // base fill
    cx.fillStyle=theme.fg;cx.fillRect(x,y,w,h);
    // Celeste-style top highlight strip
    cx.fillStyle=theme.accent;cx.fillRect(x,y,w,2);
    // inner shadow (bottom edge darker)
    cx.fillStyle='rgba(0,0,0,0.35)';cx.fillRect(x,y+h-2,w,2);
    // pixel noise texture — every other pixel offset
    cx.fillStyle='rgba(255,255,255,0.06)';
    for(let tx=x;tx<x+w;tx+=3)for(let ty=y+2;ty<y+h-2;ty+=3){
      if((tx+ty)%6===0)cx.fillRect(tx,ty,1,1);
    }
    // glow on top edge
    cx.save();
    cx.shadowColor=theme.accent;cx.shadowBlur=6;
    cx.fillStyle=theme.accent;cx.fillRect(x,y,w,1);
    cx.restore();
  }
}

function glowRect(x,y,w,h,col,blur=8){
  cx.save();cx.shadowColor=col;cx.shadowBlur=blur;
  cx.fillStyle=col;cx.fillRect(x,y,w,h);cx.restore();
}

function drawPlayer(){
  const px=Math.round(p.x),py=Math.round(p.y);
  const fl=!p.facingR;
  // body
  cx.fillStyle=p.iframes>0&&Math.floor(sec()*10)%2?'#fff':'#4fc3f7';
  cx.fillRect(px,py+4,PW,PH-4);
  // head
  cx.fillStyle='#ffe0b2';cx.fillRect(fl?px+1:px,py,9,6);
  // eyes
  cx.fillStyle='#111';cx.fillRect(fl?px+2:px+7,py+2,2,2);
  // legs anim
  const lf=Math.floor(sec()*8)%2;
  cx.fillStyle='#1565c0';
  if(p.onGround&&Math.abs(p.vx)>0.5){
    cx.fillRect(fl?px+5:px,py+PH-4,4,4);
    cx.fillRect(fl?px:px+5,py+PH-(lf?6:4),4,lf?6:4);
  } else {
    cx.fillRect(px,py+PH-4,4,4);cx.fillRect(px+5,py+PH-4,4,4);
  }
  // glow on player body
  cx.save();cx.shadowColor='#4fc3f7';cx.shadowBlur=8;
  cx.fillStyle='#4fc3f7';cx.fillRect(px,py+4,PW,PH-4);cx.restore();
  // redraw body over glow cleanly
  cx.fillStyle=p.iframes>0&&Math.floor(sec()*10)%2?'#fff':'#4fc3f7';
  cx.fillRect(px,py+4,PW,PH-4);
  // shield ring
  if(p.shieldUp){
    cx.save();cx.shadowColor='#90caf9';cx.shadowBlur=10;
    cx.strokeStyle='#90caf9';cx.lineWidth=1;
    cx.strokeRect(px-2,py-2,PW+4,PH+4);cx.restore();
  }
  // dash trail
  if(p.dashTimer>0){
    cx.save();cx.shadowColor='#aaf';cx.shadowBlur=6;
    cx.fillStyle='rgba(170,170,255,0.4)';
    cx.fillRect(px-p.dashDirX*8,py-p.dashDirY*8,PW,PH-4);cx.restore();
  }
  // weapon attack visual
  if(p.atkTimer>0){
    if(run.weapon==='dagger'){
      cx.save();cx.shadowColor='#4fc3f7';cx.shadowBlur=10;
      cx.fillStyle='rgba(79,195,247,0.75)';
      cx.fillRect(p.facingR?px+PW:px-14,py+2,14,10);cx.restore();
    } else if(run.weapon==='tome'){
      const r=has('blast_aoe')?80:50;
      cx.save();cx.strokeStyle='rgba(224,64,251,0.5)';
      cx.shadowColor='#e040fb';cx.shadowBlur=14;cx.lineWidth=2;
      cx.beginPath();cx.arc(px+PW/2,py+PH/2,r,0,Math.PI*2);cx.stroke();cx.restore();
    }
  }
}

function drawBoss(){
  if(!bossEntity)return;
  const b=bossEntity;
  const bx=Math.round(b.x);
  const by=Math.round(b.y);
  const t=b.hp/b.maxHp;
  // squish: flatter on ground, taller in air
  const sw=b.onGround?34:26,sh=b.onGround?16:24;
  const ox=Math.round((b.w-sw)/2),oy=b.h-sh;
  const r=Math.round(lerp(60,120,t)),g=Math.round(lerp(200,220,t));
  const col=`rgb(${r},${g},60)`;
  // glow body
  cx.save();cx.shadowColor=col;cx.shadowBlur=14;
  cx.fillStyle=col;cx.fillRect(bx+ox,by+oy,sw,sh);cx.restore();
  // solid body
  cx.fillStyle=col;cx.fillRect(bx+ox,by+oy,sw,sh);
  // highlight top strip
  cx.fillStyle='rgba(255,255,255,0.2)';cx.fillRect(bx+ox,by+oy,sw,3);
  // eyes
  cx.fillStyle='#fff';cx.fillRect(bx+ox+4,by+oy+4,7,7);cx.fillRect(bx+ox+sw-11,by+oy+4,7,7);
  cx.fillStyle='#111';cx.fillRect(bx+ox+6,by+oy+6,4,4);cx.fillRect(bx+ox+sw-9,by+oy+6,4,4);
  // angry brow lines at low HP
  if(t<0.5){
    cx.fillStyle='#111';
    cx.fillRect(bx+ox+4,by+oy+3,5,2);cx.fillRect(bx+ox+sw-9,by+oy+3,5,2);
  }
  // iframe flash
  if(b.iframes>0&&Math.floor(sec()*12)%2){
    cx.fillStyle='rgba(255,255,255,0.45)';cx.fillRect(bx+ox,by+oy,sw,sh);
  }
}

function drawBossHUD(){
  if(!bossEntity)return;
  const b=bossEntity;
  const t=b.hp/b.maxHp;
  const barW=W-40;
  const r=Math.round(lerp(60,120,t)),g=Math.round(lerp(200,220,t));
  const col=`rgb(${r},${g},60)`;
  cx.fillStyle='#050508';cx.fillRect(20,10,barW,10);
  cx.fillStyle=col;cx.fillRect(20,10,Math.round(barW*t),10);
  cx.save();cx.shadowColor=col;cx.shadowBlur=8;
  cx.strokeStyle=col;cx.lineWidth=1;cx.strokeRect(20,10,barW,10);
  cx.restore();
  txtC('THE GREAT SLIME',24,col);
}

function drawEnemies(theme){
  for(const e of enemies){
    const ex=Math.round(e.x),ey=Math.round(e.y);
    const col=e.stunTimer>0?'#aaa':theme.accent;
    // simple blocky enemy sprite
    cx.fillStyle=col;cx.fillRect(ex,ey,e.w,e.h);
    cx.fillStyle='#111';cx.fillRect(ex+2,ey+3,2,2);cx.fillRect(ex+6,ey+3,2,2);
    // hp pip
    if(e.hp>1){cx.fillStyle='#f44';cx.fillRect(ex+1,ey-3,e.w-2,2);
      cx.fillStyle='#4f4';cx.fillRect(ex+1,ey-3,Math.round((e.hp/2)*(e.w-2)),2);}
  }
}

function drawDrops(){
  for(const d of drops){
    if(d.collected)continue;
    const col=d.type==='coin'?'#ffd700':'#e040fb';
    cx.save();cx.shadowColor=col;cx.shadowBlur=8;
    cx.fillStyle=col;cx.fillRect(Math.round(d.x),Math.round(d.y),4,4);

  }
}

function drawProjectiles(){

    cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=6;

  }
}

function drawExit(){
  if(!exitOpen)return;
  const ex=exitX,ey=exitY;
  const pulse=0.7+0.3*Math.sin(sec()*4);
  cx.save();
  cx.shadowColor=`rgba(255,255,100,${pulse})`;cx.shadowBlur=16*pulse;
  cx.fillStyle=`rgba(255,255,100,${pulse})`;
  cx.fillRect(ex-2,ey-12,14,14);
  cx.restore();
  // door frame outline
  cx.strokeStyle=`rgba(255,220,50,${pulse})`;cx.lineWidth=1;
  cx.strokeRect(ex-3,ey-13,16,16);

}

function drawHUD(){
  // HP hearts with glow
  for(let i=0;i<run.maxHp;i++){
    const full=i<run.hp;
    cx.save();
    if(full){cx.shadowColor='#e53935';cx.shadowBlur=6;}
    cx.fillStyle=full?'#e53935':'#333';cx.fillRect(4+i*10,4,8,8);
    cx.fillStyle=full?'#ef9a9a':'#555';cx.fillRect(4+i*10,4,4,4);
    cx.restore();
  }
  // coins with glow
  cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=5;
  cx.fillStyle='#ffd700';cx.fillRect(4,16,6,6);cx.restore();
  txt(String(run.coins),12,16,'#ffd700');
  // shards with glow
  cx.save();cx.shadowColor='#e040fb';cx.shadowBlur=5;
  cx.fillStyle='#e040fb';cx.fillRect(4,25,6,6);cx.restore();
  txt(String(run.shards),12,25,'#e040fb');
  // depth
  txt('DEPTH:'+run.depth,W-60,4,'#aaa');
  // theme name (hidden during boss — boss HUD takes that space)
  if(!bossEntity){
    const tn=THEMES[run.themeIdx].name;
    const tc=THEMES[run.themeIdx].accent;
    cx.save();cx.shadowColor=tc;cx.shadowBlur=8;
    txt(tn,Math.round((W-txtW(tn))/2),4,tc);cx.restore();
  }
  // weapon indicator (bottom right)
  if(run.weapon){
    const wc={dagger:'#4fc3f7',crossbow:'#ffd700',tome:'#e040fb'}[run.weapon];
    const wn={dagger:'DAGGER',crossbow:'CROSSBOW',tome:'TOME'}[run.weapon];
    cx.save();cx.shadowColor=wc;cx.shadowBlur=6;
    txt(wn,W-txtW(wn)-4,H-12,wc);cx.restore();
    // attack cooldown bar
    const maxCd=run.weapon==='crossbow'?CROSSBOW_ATK_CD:run.weapon==='tome'?TOME_ATK_CD:BASE_ATK_CD;
    const pct=1-p.atkCd/maxCd;
    cx.fillStyle='#222';cx.fillRect(W-44,H-5,40,3);
    cx.fillStyle=wc;cx.fillRect(W-44,H-5,Math.round(pct*40),3);
  } else {
    txt('Z-ATK DASH',4,H-10,'#333');
  }
}

function drawParticles(){
  for(const pt of particles){
    cx.globalAlpha=pt.life;cx.fillStyle=pt.col;
    cx.fillRect(Math.round(pt.x-pt.r),Math.round(pt.y-pt.r),pt.r*2,pt.r*2);
  }
  cx.globalAlpha=1;
}

// ── Exit check ────────────────────────────────────────────────────────────────
function checkExit(){
  if(!exitOpen)return;
  if(ov(p.x,p.y,PW,PH,exitX,exitY-12,14,14)){
    if(currentRoom.type==='boss'){
      advanceTheme();
    } else if(currentRoom.type==='treasure'){
      upgradeChoices=pickUpgrades(run.upgrades,run.weapon);upgradeSelected=0;
      fadeTo(()=>{STATE='UPGRADE_PICK';});
    } else {
      nextRoom();
    }
  }
}

// ── Main update ────────────────────────────────────────────────────────────────
let last=0;
function update(ts){
  const dt=Math.min((ts-last)/16.67,3);last=ts;

  if(STATE==='TRANSITION'){
    transitionAlpha+=0.06*transitionDir*dt;
    if(transitionAlpha>=1&&transitionDir===1){transitionAlpha=1;transitionDir=-1;transitionCallback&&transitionCallback();}
    else if(transitionAlpha<=0&&transitionDir===-1){transitionAlpha=0;STATE=prevState!=='TRANSITION'?prevState:'RUN';}
    drawFrame();requestAnimationFrame(update);return;
  }

  prevState=STATE;

  if(STATE==='RUN'){
    updatePlayer();
    updateCamera();
    updateEnemies();
    updateBoss();
    updateProjectiles();
    updateDrops();
    updateParticles();
    checkExit();
  }

  drawFrame();
  requestAnimationFrame(update);
}

function drawFrame(){
  cx.clearRect(0,0,W,H);
  const theme=THEMES[run.themeIdx];

  if(STATE==='MENU'){
    drawMenu();
  } else if(STATE==='RUN'){
    drawBg(theme);
    cx.save();cx.translate(-Math.round(cameraX),0);
    drawPlats(currentRoom.plats,theme);
    drawDrops();
    drawProjectiles();
    drawExit();
    drawEnemies(theme);
    drawBoss();
    drawPlayer();
    drawParticles();
    cx.restore();
    drawHUD();
    drawBossHUD();
  } else if(STATE==='WEAPON_PICK'){
    drawWeaponPick();
  } else if(STATE==='UPGRADE_PICK'){
    drawUpgradePick();
  } else if(STATE==='SHOP_SCREEN'){
    drawShop();
  } else if(STATE==='GAME_OVER'){
    drawGameOver();
  } else if(STATE==='WIN'){
    drawWin();
  }

  if(STATE==='TRANSITION'){
    cx.fillStyle=`rgba(0,0,0,${transitionAlpha})`;
    cx.fillRect(0,0,W,H);
  }
}

// ── Screen draws ──────────────────────────────────────────────────────────────
function drawMenu(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  // star field
  cx.fillStyle='#fff';
  for(let i=0;i<60;i++){
    const sx=(i*137)%W,sy=(i*97)%H;
    if(Math.sin(sec()*0.5+i)>0.4)cx.fillRect(sx,sy,1,1);
  }
  cx.save();cx.shadowColor='#e040fb';cx.shadowBlur=18;
  txtC('DUNGEON',80,'#e040fb',3);cx.restore();
  cx.save();cx.shadowColor='#90caf9';cx.shadowBlur=14;
  txtC('DEPTHS', 98,'#90caf9',3);cx.restore();
  txtC('PIXEL ART ROGUELITE',130,'#666',1);
  const blink=Math.floor(sec()*2)%2;
  if(blink)txtC('PRESS SPACE TO START',160,'#aaa',1);
  txt('DEPTH RECORD:'+meta.deepest,4,H-14,'#555');
}

function drawUpgradePick(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  txtC('CHOOSE AN UPGRADE',20,'#ffd700',1);
  for(let i=0;i<upgradeChoices.length;i++){
    const u=upgradeChoices[i];
    const x=8+i*104,y=50,w=100,h=70;
    const sel=i===upgradeSelected;
    cx.fillStyle=sel?'#1a1a3a':'#111';cx.fillRect(x,y,w,h);
    cx.strokeStyle=sel?'#e040fb':'#333';cx.lineWidth=2;cx.strokeRect(x,y,w,h);
    txt(u.name,x+4,y+8,sel?'#e040fb':'#aaa');
    // wrap desc
    txt(u.desc,x+4,y+24,'#666');
    txt('['+u.cat+']',x+4,y+48,'#444');
  }
  txtC('LEFT/RIGHT TO BROWSE  SPACE TO PICK',200,'#555');
}

function drawWeaponPick(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=10;
  txtC('CHOOSE YOUR WEAPON',16,'#ffd700');cx.restore();
  txtC('ALSO UNLOCKS DASH',26,'#555');
  for(let i=0;i<WEAPONS.length;i++){
    const w=WEAPONS[i];
    const x=8+i*104,y=44,ww=100,wh=130;
    const sel=i===weaponSelected;
    cx.fillStyle=sel?'#0d0d1f':'#0a0a0a';cx.fillRect(x,y,ww,wh);
    cx.strokeStyle=sel?w.col:'#333';cx.lineWidth=sel?2:1;cx.strokeRect(x,y,ww,wh);
    cx.save();if(sel){cx.shadowColor=w.col;cx.shadowBlur=10;}
    txt(w.name,x+4,y+8,sel?w.col:'#888',1);cx.restore();
    txt(w.desc,x+4,y+22,'#555');
    txt('Z OR X TO ATTACK',x+4,y+36,'#444');
    // upgrade tree preview
    txt('UPGRADES:',x+4,y+54,'#444');
    const pool=UPGRADE_POOL[w.id];
    for(let u=0;u<Math.min(pool.length,4);u++){
      txt(pool[u].name,x+4,y+64+u*14,sel?'#666':'#333');
    }
  }
  txtC('LEFT-RIGHT  SPACE TO CHOOSE',196,'#444');
}

function drawShop(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  txtC('SHOP',20,'#ffd700',2);
  cx.fillStyle='#ffd700';cx.fillRect(4,40,6,6);
  txt(String(run.coins),12,40,'#ffd700');
  for(let i=0;i<shopItems.length;i++){
    const it=shopItems[i];
    const x=8,y=60+i*52;
    const sel=i===shopSelected;
    const canAfford=run.coins>=it.cost;
    cx.fillStyle=sel?'#1a1a2a':'#111';cx.fillRect(x,y,W-16,46);
    cx.strokeStyle=sel?'#ffd700':'#333';cx.lineWidth=1;cx.strokeRect(x,y,W-16,46);
    txt(it.name,x+4,y+6,canAfford?'#fff':'#444');
    txt(it.desc,x+4,y+18,'#666');
    cx.fillStyle=canAfford?'#ffd700':'#555';cx.fillRect(x+4,y+32,6,6);
    txt(String(it.cost),x+12,y+32,canAfford?'#ffd700':'#555');
  }
  txtC('UP/DOWN  SPACE TO BUY  ESC TO LEAVE',220,'#555');
}

function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);
  txtC('YOU DIED',90,'#f44',3);
  txtC('DEPTH REACHED: '+run.depth,130,'#aaa');
  txtC('PRESS SPACE TO RETRY',160,'#555');
}

function drawWin(){
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);
  txtC('YOU WIN',90,'#ffd700',3);
  txtC('DEPTH REACHED: '+run.depth,130,'#aaa');
  txtC('PRESS SPACE FOR NEW RUN',160,'#555');
}

// ── Input dispatch ────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(STATE==='MENU'){
    if(e.code==='Space'){
      newRun();
      const def=pick(ROOM_POOLS.grasslands.filter(r=>r.type!=='boss'));
      fadeTo(()=>{loadRoom(def);STATE='RUN';});
    }
  } else if(STATE==='WEAPON_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')weaponSelected=(weaponSelected+WEAPONS.length-1)%WEAPONS.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')weaponSelected=(weaponSelected+1)%WEAPONS.length;
    if(e.code==='Space'){
      run.weapon=WEAPONS[weaponSelected].id;
      const themeKey=THEME_KEYS[run.themeIdx];
      const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
      fadeTo(()=>{loadRoom(def);STATE='RUN';});
    }
  } else if(STATE==='UPGRADE_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')upgradeSelected=(upgradeSelected+upgradeChoices.length-1)%upgradeChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')upgradeSelected=(upgradeSelected+1)%upgradeChoices.length;
    if(e.code==='Space'){
      run.upgrades.push(upgradeChoices[upgradeSelected].id);
      nextRoom();
    }
    if(e.code==='Escape')nextRoom();
  } else if(STATE==='SHOP_SCREEN'){
    if(e.code==='ArrowUp'||e.code==='KeyW')shopSelected=(shopSelected+shopItems.length-1)%shopItems.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')shopSelected=(shopSelected+1)%shopItems.length;
    if(e.code==='Space'){
      const it=shopItems[shopSelected];
      if(run.coins>=it.cost){
        run.coins-=it.cost;
        if(it.id==='heal')run.hp=Math.min(run.hp+2,run.maxHp);
        if(it.id==='maxhp'){run.maxHp++;run.hp++;}
        if(it.id==='upgrade'){upgradeChoices=pickUpgrades(run.upgrades,run.weapon);upgradeSelected=0;STATE='UPGRADE_PICK';}
      }
    }
    if(e.code==='Escape'){nextRoom();}
  } else if(STATE==='GAME_OVER'||STATE==='WIN'){
    if(e.code==='Space'){
      if(run.depth>meta.deepest){meta.deepest=run.depth;saveMeta();}
      meta.runs++;saveMeta();
      STATE='MENU';
    }
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(update);});
</script>
</body>
</html>
