// ── Utilities ─────────────────────────────────────────────────────────────────
function ov(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function rng(min,max){return Math.random()*(max-min)+min;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function lerp(a,b,t){return a+(b-a)*t;}
function sec(){return performance.now()/1000;}
function hash(n){return((n*1103515245+12345)>>>0);}
function frand(s){return(hash(s)&0xffff)/0xffff;}

function txt(str,x,y,col='#fff',scale=1){
  str=String(str).toUpperCase();
  let ox=x;
  for(const ch of str){
    const g=FONT[ch]||FONT[' '];
    for(let r=0;r<g.length;r++)
      for(let c=0;c<g[r].length;c++)
        if(g[r][c]){cx.fillStyle=col;cx.fillRect(ox+c*scale,y+r*scale,scale,scale);}
    ox+=(g[0].length+1)*scale;
  }
}
function txtW(str,scale=1){
  let w=0;
  for(const ch of String(str).toUpperCase()){const g=FONT[ch]||FONT[' '];w+=(g[0].length+1)*scale;}
  return w-scale;
}
function txtC(str,y,col,scale=1){txt(str,Math.round((W-txtW(str,scale))/2),y,col,scale);}

function initAudio(){
  if(audioCtx)return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();musicGain.gain.value=meta.settings.musicVol;
  musicGain.connect(audioCtx.destination);}catch(e){}
}
function beep(freq,type,when,dur,vol){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,when);g.gain.exponentialRampToValueAtTime(0.001,when+dur);
  o.connect(g);g.connect(musicGain);o.start(when);o.stop(when+dur+0.02);
}
function loopMusic(key){
  if(!meta.settings.musicOn||!audioCtx)return;
  const m=MUSIC_SEQS[key]||MUSIC_SEQS.grasslands;
  const step=60/m.bpm/2;const now=audioCtx.currentTime+0.05;
  for(let i=0;i<8;i++){
    beep(m.seq[i],m.wave,now+i*step,step*0.7,0.07);
    if(i%2===0)beep(m.bass[Math.floor(i/2)%4],'triangle',now+i*step,step*1.5,0.05);
  }
  [0,2,4,6].forEach(b=>{
    if(!audioCtx)return;
    const ko=audioCtx.createOscillator(),kg=audioCtx.createGain();
    ko.type='sine';ko.frequency.setValueAtTime(110,now+b*step);ko.frequency.exponentialRampToValueAtTime(0.01,now+b*step+0.08);
    kg.gain.setValueAtTime(0.12,now+b*step);kg.gain.exponentialRampToValueAtTime(0.001,now+b*step+0.1);
    ko.connect(kg);kg.connect(musicGain);ko.start(now+b*step);ko.stop(now+b*step+0.11);
  });
  musicTimer=setTimeout(()=>loopMusic(key),(8*step-0.04)*1000);
}
function startMusic(themeIdx){
  if(!audioCtx)initAudio();stopMusic();
  if(meta.settings.musicOn)loopMusic(THEME_KEYS[themeIdx]||'grasslands');
}
function stopMusic(){if(musicTimer){clearTimeout(musicTimer);musicTimer=null;}}
function sfx(type){
  if(!meta.settings.sfxOn)return;initAudio();if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain(),sg=audioCtx.createGain();
  sg.gain.value=0.22;sg.connect(audioCtx.destination);
  switch(type){
    case'jump':    o.type='square';   o.frequency.setValueAtTime(380,now);o.frequency.linearRampToValueAtTime(720,now+0.07);g.gain.setValueAtTime(0.1,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.09);break;
    case'hit':     o.type='sawtooth'; o.frequency.setValueAtTime(380,now);o.frequency.exponentialRampToValueAtTime(80,now+0.09);g.gain.setValueAtTime(0.18,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.13);break;
    case'hurt':    o.type='sawtooth'; o.frequency.setValueAtTime(160,now);o.frequency.exponentialRampToValueAtTime(70,now+0.2);g.gain.setValueAtTime(0.28,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.22);break;
    case'coin':    o.type='sine';     o.frequency.setValueAtTime(880,now);o.frequency.linearRampToValueAtTime(1320,now+0.05);g.gain.setValueAtTime(0.09,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.07);break;
    case'boss':    o.type='square';   o.frequency.setValueAtTime(440,now);o.frequency.exponentialRampToValueAtTime(110,now+0.4);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.45);break;
    case'upgrade': o.type='square';   o.frequency.setValueAtTime(440,now);o.frequency.setValueAtTime(550,now+0.08);o.frequency.setValueAtTime(660,now+0.16);g.gain.setValueAtTime(0.14,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.28);break;
    case'explode': o.type='sawtooth'; o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(40,now+0.25);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.3);break;
    default:return;
  }
  o.connect(g);g.connect(sg);o.start(now);o.stop(now+0.5);
}

function has(id){return run.upgrades.includes(id);}
function pickUpgrades(){
  const wPool=run.weapon?UPGRADE_POOL[run.weapon]:[];
  const DASH_IDS=['extra_dash','dash_cd'];
  const noWeapon=run.weapon===null;
  const wc=run.weapon?WEAPON_COLORS[run.weapon]:'#aaa';
  const uBank=UPGRADE_POOL.universal.filter(u=>!has(u.id)&&(!noWeapon||!DASH_IDS.includes(u.id)));
  let wBank=wPool.filter(u=>!has(u.id));
  function pickFrom(bank){if(!bank.length)return null;const i=Math.floor(Math.random()*bank.length);return bank.splice(i,1)[0];}
  const out=[];const addId=new Set();
  function add(u,pool,pc){if(u&&!addId.has(u.id)){addId.add(u.id);out.push({...u,_pool:pool,_pc:pc});return true;}return false;}
  add(pickFrom(uBank),'universal','#aaa');
  const fromW=wBank.length>0;
  add(pickFrom(fromW?wBank:uBank),fromW?'weapon':'universal',fromW?wc:'#aaa');
  const leftover=[...wBank,...uBank];
  const u3=pickFrom(leftover);
  if(u3){const inW=wPool.some(u=>u.id===u3.id);add(u3,inW?'weapon':'universal',inW?wc:'#aaa');}
  return out;
}

function genThemeSeq(){const t2=_shuffle([1,2,3]);const t3=_shuffle([4,5,6]);const t4=_shuffle([7,8,9]);return[0,...t2,...t3,...t4];}

function spawnEnemies(roomDef,floorIdx,typeIdx){
  enemies=[];
  if(roomDef.enemyCount===0)return;
  const types=ENEMY_TYPES_BY_THEME[typeIdx];
  const plats=roomDef.plats.filter(pl=>pl[1]<220&&pl[2]>=40); // non-floor, wide enough for enemies
  for(let i=0;i<roomDef.enemyCount;i++){
    const plat=pick(plats.length?plats:roomDef.plats);
    const etype=pick(types);
    const baseHp=2+(floorIdx>=5?1:0)+(floorIdx>=7?1:0);
    enemies.push({
      x:plat[0]+plat[2]/2,y:plat[1]-14,
      vx:pick([-0.5,0.5]),vy:0,
      w:10,h:14,hp:baseHp,maxHp:baseHp,
      type:etype,
      platX:plat[0],platRight:plat[0]+plat[2],platY:plat[1],
      onGround:false,stunTimer:0,
      dropCoins:pick([1,1,1,2]),
      atkCd:60+Math.floor(Math.random()*80),
      iframes:0,armor:etype==='craboid'?2:0,
      revived:false,sawCharging:false,
      poisonTimer:0,curseTimer:0,

  }
}

function loadRoom(roomDef){
  currentRoom=roomDef;

  chestAnim=0;chestX=exitX-16;chestY=exitY;

  movingPlatEntities=(roomDef.movers||[]).map(m=>Object.assign({x:m.bx,y:m.by,vx:0},m));
  lavaY=curTI()===6?290:null;
  icicles=[];icicleTimer=0;
  eliteRoom=false;eliteWave=0;eliteWaveTimer=0;eliteBannerFrames=0;eliteClearFrames=0;eliteHazardTimer=0;eliteSealIn=0;sigilRing=null;
  resetPlayer(roomDef.spawn[0],roomDef.spawn[1]);
  if(hasSigil(2)){p.iframes=90;} // frostlock: nullify first hit via startup iframes
  spawnEnemies(roomDef,run.themeIdx,curTI());
  roomEnemiesCleared=(roomDef.enemyCount===0);
  if(roomEnemiesCleared&&roomDef.type!=='boss'&&roomDef.type!=='treasure')exitOpen=true;
  if(has('shield'))p.shieldUp=true;
}

function advanceTheme(){
  run.eliteUsed=false;
  if(!run.worldStats)run.worldStats=[];
  run.worldStats.push({ti:curTI(),name:THEMES[curTI()].name,rooms:run.roomIdx});
  // verdant_knot sigil: +1 HP on world advance
  if(hasSigil(0))run.hp=Math.min(run.hp+1,run.maxHp);
  run.themeIdx++;
  run.roomIdx=0;
  if(run.themeIdx>=THEMES.length){
    unlock('all_worlds');
    fadeTo(()=>{STATE='WIN';});return;
  }
  if(run.themeIdx===2)unlock('world_3');
  if(run.themeIdx===5)unlock('world_5');
  if(run.weapon===null){
    fadeTo(()=>{weaponChoices=buildWeaponChoices();weaponSelected=0;pickingWeapon2=false;STATE='WEAPON_PICK';});
    return;
  }
  if(run.themeIdx===5&&run.weapon2===null){
    fadeTo(()=>{weaponChoices=buildWeapon2Choices();weaponSelected=0;pickingWeapon2=true;STATE='WEAPON_PICK';});
    return;
  }
  const themeKey=curThemeKey();
  const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
  fadeTo(()=>{loadRoom(def);startMusic(curTI());STATE='RUN';});
}

function nextRoom(){
  run.depth++;
  run.roomIdx++;
  const themeKey=curThemeKey();
  if(run.roomIdx===3){
    shrineChoices=pickUpgrades();shrineSelected=0;
    fadeTo(()=>{STATE='SHRINE_SCREEN';});return;
  }
  if(run.roomIdx===4){
    buildShop();fadeTo(()=>{STATE='SHOP_SCREEN';});return;
  }
  if(run.roomIdx===5){
    const br=BOSS_ROOMS[themeKey];
    fadeTo(()=>{loadRoom(br);spawnBoss(run.themeIdx);STATE='RUN';});return;
  }
  if(run.roomIdx>=6){advanceTheme();return;}
  const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
  const isElite=run.roomIdx<3&&(meta.perks.includes('oath')||Math.random()<0.30)&&!run.eliteUsed;
  if(isElite){run.eliteUsed=true;if(meta.perks.includes('oath'))perkFlash['oath']=24;}
  fadeTo(()=>{
    loadRoom(def);
    if(isElite){eliteRoom=true;eliteBannerFrames=36;eliteHazardTimer=80;}
    STATE='RUN';
  });
}

function buildShop(){
  let pct=0;
  if(meta.perks.includes('oath'))pct+=0.25;
  pct=Math.min(0.5,pct);
  const flatDisc=meta.perks.includes('bargain')?1:0;
  function sc(base){return Math.max(1,Math.round(base*(1-pct))-flatDisc);}
  shopItems=[

// ── Physics step ──────────────────────────────────────────────────────────────
const GRAV=0.4,MAX_VY=8;
function isBlinking(plat){return plat[4]&&Math.sin(sec()*3.2+plat[4])<-0.3;}
function getAllPlats(){
  const s=currentRoom?currentRoom.plats.filter(p=>!isBlinking(p)):[];
  if(!movingPlatEntities.length)return s;
  return s.concat(movingPlatEntities.map(m=>[m.x,m.y,m.w,m.h]));
}
function physStep(obj,plats,grav=GRAV,mVy=MAX_VY){
  obj.vy=Math.min(obj.vy+grav,mVy);
  obj.x+=obj.vx;
  obj.y+=obj.vy;
  obj.onGround=false;
  for(const [px,py,pw,ph] of plats){
    if(ov(obj.x,obj.y,obj.w||PW,obj.h||PH,px,py,pw,ph)){
      const ox=(obj.x+(obj.w||PW)/2)-(px+pw/2);
      const oy=(obj.y+(obj.h||PH)/2)-(py+ph/2);
      const overX=(obj.w||PW)/2+pw/2-Math.abs(ox);
      const overY=(obj.h||PH)/2+ph/2-Math.abs(oy);
      if(overX<overY){
        obj.x+=ox>0?overX:-overX;obj.vx=0;
      } else {
        obj.y+=oy>0?overY:-overY;
        if(oy<0){obj.onGround=true;obj.vy=0;}
        else obj.vy=0;
      }
    }
  }
  obj.x=clamp(obj.x,0,(currentRoom?currentRoom.w||W:W)-(obj.w||PW));
}

function updateMovers(){
  const t=sec();
  for(const m of movingPlatEntities){
    const prevX=m.x;
    m.x=m.bx+Math.sin(t*m.spd*60+m.phase)*m.range;
    m.vx=m.x-prevX;
  }
}

const TELEGRAPH_FRAMES=36;
const DASH_SPEED=8,DASH_DUR=7;
const BASE_ATK_CD=20,CROSSBOW_ATK_CD=35,TOME_ATK_CD=30;

function daggerHit(){
  const sx=p.facingR?p.x+PW:p.x-14;
  const dmg=(has('stomp_dmg')?2:1)*(has('crit')&&Math.random()<0.25?3:1);
  if(bossEntity&&ov(sx,p.y,14,PH,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(dmg);
  const doSpin=has('spin_blade');
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const hit=doSpin?ov(p.x-14,p.y-14,PW+28,PH+28,e.x,e.y,e.w,e.h):ov(sx,p.y,14,PH,e.x,e.y,e.w,e.h);
    if(hit){
      if(damageEnemy(i,dmg))burst(e.x+e.w/2,e.y+e.h/2,'#4fc3f7',6);
      if(has('poison')&&enemies[i]===e)e.poisonTimer=120;
    }
  }
}

function damageEnemy(j,dmg){
  const e=enemies[j];
  if(!e||e.iframes>0||e._burrowed)return false;
  if(hasSigil(6)&&Math.random()<0.3)dmg++; // cinder: 30% chance +1 burn damage
  if(e.armor>0){
    e.armor--;
    burst(e.x+e.w/2,e.y+e.h/2,'#888',4);
    if(e.armor===0)burst(e.x+e.w/2,e.y+e.h/2,'#ffaa00',8);
    return false;
  }
  e.hp-=dmg;
  if(e.hp<=0)killEnemy(j);
  return true;
}

function killEnemy(j){
  const e=enemies[j];
  if(e.type==='seraph'&&!e.revived){
    e.hp=1;e.revived=true;e.iframes=80;
    burst(e.x+e.w/2,e.y,'#ffd700',16);sfx('hit');
    return;
  }
  spawnDrops(e.x+e.w/2,e.y,e.dropCoins);
  if(Math.random()<0.15)spawnShard(e.x+e.w/2,e.y);
  if(has('regen')&&run.hp<run.maxHp)run.hp++;
  unlock('first_blood');
  if(has('death_nova')){for(const oe of enemies){if(oe!==e&&Math.abs(oe.x-e.x)<60){oe.hp--;burst(oe.x+oe.w/2,oe.y,'#f84',6);}}}
  if(has('bomb_chain')&&!e._chaining){
    const bcx=e.x+e.w/2,bcy=e.y+e.h/2;burst(bcx,bcy,'#ff6600',14);
    for(let k=enemies.length-1;k>=0;k--){const oe=enemies[k];if(oe===e)continue;const dx=oe.x+oe.w/2-bcx,dy=oe.y+oe.h/2-bcy;if(Math.sqrt(dx*dx+dy*dy)<24){oe._chaining=true;damageEnemy(k,1);}}
  }
  burst(e.x+e.w/2,e.y,THEMES[curTI()].accent,10);
  // EB-4: Crystal refraction — split into 2 half-stat copies
  if(curTI()===4&&!e._isSplit)spawnSplits(e,j);
  // EB-5: Volcanic ignition pop — lava puddle hazard
  if(curTI()===6&&e.onGround)hazards.push({x:e.x+e.w/2-12,y:e.y+e.h-4,w:24,h:4,timer:30,col:'#ff7043'});
  enemies.splice(j,1);
}
function spawnSplits(par,j){
  const hp=Math.ceil((par.maxHp||2)/2);
  for(let s=-1;s<=1;s+=2){
    const nx=clamp(par.x+s*6,par.platX||4,(par.platRight||636)-Math.round((par.w||12)*0.7));
    enemies.splice(j,0,{
      type:par.type,x:nx,y:par.y,vx:s*1.2,vy:-2,
      w:Math.round((par.w||12)*0.7),h:Math.round((par.h||12)*0.7),
      hp:hp,maxHp:hp,iframes:20,stunTimer:0,poisonTimer:0,curseTimer:0,
      onGround:false,armor:0,dropCoins:0,atkCd:60,
      platX:par.platX,platRight:par.platRight,platY:par.platY,
      _isSplit:true,_burrowUsed:true,revived:false,
    });
    burst(par.x+par.w/2,par.y+par.h/2,'#e040fb',6);
  }
}

function updateProjectiles(){
  const roomW=currentRoom?currentRoom.w||W:W;
  for(let i=projectiles.length-1;i>=0;i--){
    const proj=projectiles[i];
    proj.x+=proj.vx;proj.y+=proj.vy;
    proj.life--;

    // Bomb handling
    if(proj.type==='bomb'){
      if(!proj.stuck)proj.vy+=GRAV;
      let explode=proj.life<=0;
      for(const[px,py,pw,ph] of currentRoom.plats){
        if(ov(proj.x-2,proj.y-2,6,6,px,py,pw,ph)){
          if(proj.sticky&&!proj.stuck){proj.stuck=true;proj.vx=0;proj.vy=0;proj.life=90;}
          else if(!proj.sticky){explode=true;}
          break;
        }
      }
      if(proj.x<0||proj.x>roomW||proj.y>H+20)explode=true;
      if(explode){
        const rad=proj.radius||32;
        burst(proj.x,proj.y,'#ff4400',20);sfx('explode');
        for(let j=enemies.length-1;j>=0;j--){
          const e=enemies[j];const dx=(e.x+e.w/2)-proj.x,dy=(e.y+e.h/2)-proj.y;
          if(Math.sqrt(dx*dx+dy*dy)<rad){if(damageEnemy(j,1))burst(e.x+e.w/2,e.y+e.h/2,'#ff4400',8);}
        }
        if(bossEntity){const dx=(bossEntity.x+bossEntity.w/2)-proj.x,dy=(bossEntity.y+bossEntity.h/2)-proj.y;if(Math.sqrt(dx*dx+dy*dy)<rad)hitBoss(1);}
        projectiles.splice(i,1);
      }
      continue;
    }

    // Boomerang handling
    if(proj.type==='boomerang'){
      if(!proj.returning&&proj.life<40){proj.returning=true;}
      if(proj.returning){
        const dx=(p.x+PW/2)-proj.x,dy=(p.y+PH/2)-proj.y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        proj.vx=lerp(proj.vx,dx/dist*5.5,0.12);proj.vy=lerp(proj.vy,dy/dist*5.5,0.12);
        if(proj.gravity){
          for(const e of enemies){const ex=(e.x+e.w/2)-proj.x,ey=(e.y+e.h/2)-proj.y;const ed=Math.sqrt(ex*ex+ey*ey)||1;if(ed<40){e.x-=ex/ed*1.2;e.y-=ey/ed*0.8;}}
        }
        if(ov(p.x-4,p.y-4,PW+8,PH+8,proj.x-3,proj.y-3,6,6)){projectiles.splice(i,1);continue;}
      }
    }

    if(proj.x<0||proj.x>roomW||proj.y<H*-1||proj.y>H+20||proj.life<=0){
      projectiles.splice(i,1);continue;
    }
    let dead=false;
    if(proj.type!=='boomerang'||!proj.returning){
      for(const [px,py,pw,ph] of currentRoom.plats){
        if(ov(proj.x,proj.y,4,3,px,py,pw,ph)){dead=true;break;}
      }
    }
    if(dead){projectiles.splice(i,1);continue;}
    const pdmg=proj.dmg||1;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      const phw=proj.wide?12:4,phh=proj.wide?7:3,pho=proj.wide?4:0;
      if(ov(proj.x-pho,proj.y,phw,phh,e.x,e.y,e.w,e.h)){
        const hit=damageEnemy(j,pdmg);
        if(hit){
          burst(e.x+e.w/2,e.y+e.h/2,'#ffd700',6);
          if(proj.rangStun)e.stunTimer=120;
          if(proj.explosive){
            burst(e.x+e.w/2,e.y+e.h/2,'#ff6600',10);
            for(let k=enemies.length-1;k>=0;k--){if(k!==j){const ox=enemies[k].x+enemies[k].w/2,oy=enemies[k].y+enemies[k].h/2,dx2=ox-(e.x+e.w/2),dy2=oy-(e.y+e.h/2);if(Math.sqrt(dx2*dx2+dy2*dy2)<18)damageEnemy(k,1);}}
          }
        }
        if(hit&&!proj.pierce){dead=true;break;}
        if(!hit&&e.armor===0&&!proj.pierce){dead=true;break;} // stopped by armor
      }
    }
    if(!dead&&bossEntity&&ov(proj.x,proj.y,4,3,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h)){
      if(hitBoss(pdmg)&&!proj.pierce)dead=true;
    }
    if(dead&&proj.type!=='boomerang')projectiles.splice(i,1);
  }
}

const BASE_FUSE_CD=38;
function fusionAttack(){
  const key=run.fusedWeapon;
  const cdMult=has('fast_blade')||has('reload_cd')?0.6:1;
  const dir=p.facingR?1:-1;
  if(key==='crossbow+dagger'){
    // BLADESTORM: 5-bolt spread fan
    p.atkTimer=8;p.atkCd=Math.round(BASE_FUSE_CD*cdMult);
    for(const ang of [-0.45,-0.22,0,0.22,0.45]){
      projectiles.push({x:p.x+PW/2,y:p.y+PH/2,vx:dir*5*Math.cos(ang),vy:5*Math.sin(ang),pierce:false,life:55});
    }
    burst(p.x+(p.facingR?PW:0),p.y+PH/2,'#88ccff',10);
  } else if(key==='dagger+tome'){
    // SOUL REAPER: wide lifesteal melee
    p.atkTimer=14;p.atkCd=Math.round(BASE_FUSE_CD*cdMult);
    const lx=p.facingR?p.x+PW:p.x-36;const ly=p.y-8;
    if(bossEntity&&ov(lx,ly,36,PH+16,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(2);
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];if(ov(lx,ly,36,PH+16,e.x,e.y,e.w,e.h)){
        const wouldKill=e.iframes===0&&e.armor===0&&e.hp<=2;
        if(damageEnemy(i,2)){burst(e.x+e.w/2,e.y,'#cc44ff',6);}
        if(wouldKill)run.hp=Math.min(run.hp+1,run.maxHp);
      }
    }
    burst(p.x+(p.facingR?PW+18:-18),p.y+PH/2,'#cc44ff',12);sfx('hit');
  } else if(key==='crossbow+tome'){
    // ARCANE ORB: piercing 2x-damage magic bolt
    p.atkCd=Math.round(BASE_FUSE_CD*1.2*cdMult);
    projectiles.push({x:p.x+PW/2,y:p.y+PH/2,vx:dir*4.5,vy:0,pierce:true,life:90,dmg:2});
    burst(p.x+(p.facingR?PW:0),p.y+PH/2,'#aa44ff',12);
  } else if(key==='bomb+lance'){
    // MINE LANCE: melee hit + planted bomb at lance tip
    p.atkTimer=12;p.atkCd=Math.round(BASE_FUSE_CD*1.4*cdMult);
    const lx=p.facingR?p.x+PW:p.x-28;
    if(bossEntity&&ov(lx,p.y,28,PH,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(2);
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];if(ov(lx,p.y,28,PH,e.x,e.y,e.w,e.h)){if(damageEnemy(i,2))burst(e.x+e.w/2,e.y,'#ff6622',6);}
    }
    projectiles.push({x:p.facingR?p.x+PW+28:p.x-28,y:p.y+PH/2,vx:0,vy:0,type:'bomb',life:55,pierce:false,radius:44});
    burst(p.x+(p.facingR?PW+14:-14),p.y+PH/2,'#ff6622',6);sfx('hit');
  } else if(key==='bomb+boomerang'){
    // CLUSTER RING: 4-way bombs
    p.atkCd=Math.round(BASE_FUSE_CD*1.5*cdMult);
    for(let i=0;i<4;i++){const a=i/4*Math.PI*2;projectiles.push({x:p.x+PW/2,y:p.y+PH/2,vx:Math.cos(a)*3.2,vy:Math.sin(a)*3.2,type:'bomb',life:48,pierce:false,radius:28});}
    burst(p.x+PW/2,p.y+PH/2,'#ffaa00',16);
  } else {
    // Generic combo: fast bolt + melee on the other side
    p.atkCd=Math.round(BASE_FUSE_CD*cdMult);
    projectiles.push({x:p.x+PW/2,y:p.y+PH/2,vx:dir*5,vy:0,pierce:false,life:70,dmg:2});
    const lx2=p.facingR?p.x-20:p.x+PW;
    if(bossEntity&&ov(lx2,p.y,20,PH,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(1);
    for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(ov(lx2,p.y,20,PH,e.x,e.y,e.w,e.h)){if(damageEnemy(i,1))burst(e.x+e.w/2,e.y,'#fff',4);}}
    burst(p.x+PW/2,p.y+PH/2,'#ffffff',8);sfx('hit');
  }
}

function playerInputLocked(){
  if(bossEntity&&bossEntity.introFrames>12)return true;
  if(bossEntity&&bossEntity.dyingFrames>=0)return true;
  return false;
}

function updatePlayer(){
  if(p.dashCd>0){p.dashCd--;if(p.dashCd===0&&has('extra_dash'))p.dashExtra=1;}
  if(p.atkCd>0)p.atkCd--;
  if(p.atkTimer>0)p.atkTimer--;
  const isAquatic=THEMES[curTI()].aquatic;
  const isFrozen=curTI()===2;
  const isCelestial=curTI()===8;
  if(playerInputLocked()){physStep(p,getAllPlats(),isAquatic?0.15:isCelestial?0.2:GRAV,isAquatic?3:isCelestial?5:MAX_VY);return;}
  if(p.dashTimer>0){
    p.dashTimer--;
    p.vx=DASH_SPEED*p.dashDirX;p.vy=DASH_SPEED*p.dashDirY;
    physStep(p,getAllPlats(),isAquatic?0.15:isCelestial?0.2:GRAV,isAquatic?3:isCelestial?5:MAX_VY);
    return;
  }
  const left=pressed('ArrowLeft')||pressed('KeyA');
  const right=pressed('ArrowRight')||pressed('KeyD');
  const up=pressed('ArrowUp')||pressed('KeyW');
  const down=pressed('ArrowDown')||pressed('KeyS');
  const jump=up||pressed('Space');
  const dashKey=pressed('ShiftLeft')||pressed('ShiftRight');
  const atkKey=pressed('KeyZ')||pressed('KeyX');

  if(p.frozenFr>0)p.frozenFr--;
  const spd=(has('speed_boost')?2.0:1.6)*(p.frozenFr>0?0.5:1);
  const accel=isFrozen&&p.onGround?0.08:0.3;
  const decel=isFrozen&&p.onGround?0.02:0.25;
  if(left){
    if(isFrozen&&p.onGround&&p.vx>1&&Math.random()<0.4)burst(p.x,p.y+PH,'#c0e8ff',2);
    p.vx=lerp(p.vx,-spd,accel);p.facingR=false;
  } else if(right){
    if(isFrozen&&p.onGround&&p.vx<-1&&Math.random()<0.4)burst(p.x+PW,p.y+PH,'#c0e8ff',2);
    p.vx=lerp(p.vx,spd,accel);p.facingR=true;
  } else p.vx=lerp(p.vx,0,decel);

  if(p.onGround||isAquatic)p.jumpsLeft=has('dbl_jump')?2:1;

  if(jump&&p.jumpsLeft>0&&!keys['_jHeld']){
    p.vy=isAquatic?-2.5:isCelestial?-8.2:-6.5;p.jumpsLeft--;keys['_jHeld']=true;
  } else if(jump&&has('wall_cling')&&p.wallClingDir!==0&&p.jumpsLeft===0&&!keys['_jHeld']){
    p.vy=-6.5;p.vx=p.wallClingDir*4;keys['_jHeld']=true;
  }
  if(!jump)keys['_jHeld']=false;
  if(isAquatic&&jump&&p.vy>-2.5)p.vy-=0.25; // hold-jump swimming
  if(curTI()===3&&!p.onGround){const w=Math.sin(sec()*0.42+run.roomIdx)*0.6;p.vx=clamp(p.vx+w,-4,4);}

  // lance_spin: charge while holding, 360 sweep on release
  if(run.weapon==='lance'&&has('lance_spin')){
    if(atkKey){
      if(p.spinCharge<30)p.spinCharge++;
    } else if(p.spinCharge>=30&&p.atkCd===0){
      const cdMult2=has('fast_blade')||has('reload_cd')?0.6:1;
      p.atkCd=Math.round(BASE_ATK_CD*cdMult2);
      const sdmg=has('lance_heavy')?2:1,sr=36;
      if(bossEntity&&ov(p.x-sr,p.y-sr,PW+sr*2,PH+sr*2,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(sdmg);
      for(let k=enemies.length-1;k>=0;k--){const ek=enemies[k];if(ov(p.x-sr,p.y-sr,PW+sr*2,PH+sr*2,ek.x,ek.y,ek.w,ek.h)){if(damageEnemy(k,sdmg))burst(ek.x+ek.w/2,ek.y+ek.h/2,'#ff8844',8);}}
      burst(p.x+PW/2,p.y+PH/2,'#ff8844',20);sfx('hit');
      p.spinCharge=0;
    } else if(!atkKey){
      p.spinCharge=0;
    }
  }

  // weapon attack (Z/X)
  if(atkKey&&p.atkCd===0&&run.weapon){
    if(run.fusedWeapon){fusionAttack();}else{
    const cdMult=has('fast_blade')||has('reload_cd')?0.6:1;
    if(run.weapon==='dagger'){
      p.atkTimer=8;p.atkCd=Math.round(BASE_ATK_CD*cdMult);
      daggerHit();
    } else if(run.weapon==='crossbow'){
      p.atkCd=Math.round((has('rapid_fire')?14:CROSSBOW_ATK_CD)*cdMult);
      const dir=p.facingR?1:-1;
      const angles=has('multi_shot')?[-0.25,0,0.25]:[0];
      for(const ang of angles){
        projectiles.push({x:p.x+PW/2,y:p.y+PH/2,
          vx:dir*5*Math.cos(ang),vy:5*Math.sin(ang),
          pierce:has('pierce'),life:has('sniper')?250:80,
          explosive:has('explosive_bolt')});
      }
      burst(p.x+(p.facingR?PW:0),p.y+PH/2,'#ffd700',5);
    } else if(run.weapon==='tome'){
      p.atkTimer=14;p.atkCd=Math.round(TOME_ATK_CD*cdMult);
      const radius=has('blast_aoe')?80:50;
      const dmg=has('stomp_dmg')?2:1;
      burst(p.x+PW/2,p.y+PH/2,'#e040fb',20);
      if(bossEntity){const bdx=(bossEntity.x+bossEntity.w/2)-(p.x+PW/2),bdy=(bossEntity.y+bossEntity.h/2)-(p.y+PH/2);if(Math.sqrt(bdx*bdx+bdy*bdy)<radius)hitBoss(dmg);}
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];const dx=(e.x+e.w/2)-(p.x+PW/2),dy=(e.y+e.h/2)-(p.y+PH/2);
        if(Math.sqrt(dx*dx+dy*dy)<radius){
          if(damageEnemy(i,dmg)){if(has('area_stomp')&&enemies[i]===e)e.stunTimer=60;burst(e.x+e.w/2,e.y+e.h/2,'#e040fb',6);}
          if(has('curse')&&enemies[i]===e)e.curseTimer=60;
        }
      }
      if(has('chain_spell')&&enemies.length>0){const ci=Math.floor(Math.random()*enemies.length);const ne=enemies[ci];if(damageEnemy(ci,1))burst(ne.x+ne.w/2,ne.y,'#e040fb',8);}
      if(has('shield_burst'))p.shieldUp=true;
    } else if(run.weapon==='lance'){
      if(has('lance_spin')&&p.spinCharge>0){/* noop — charging spin */}else{
      p.atkTimer=12;p.atkCd=Math.round(BASE_ATK_CD*cdMult);
      const lx=p.facingR?p.x+PW:p.x-44;
      let dmg=has('lance_heavy')?2:1;if(has('lance_titan'))dmg++;
      const lh=has('lance_wide')?PH*2:PH;const ly=p.y-(lh-PH)/2;
      if(bossEntity&&ov(lx,ly,44,lh,bossEntity.x,bossEntity.y,bossEntity.w,bossEntity.h))hitBoss(dmg);
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        if(ov(lx,ly,44,lh,e.x,e.y,e.w,e.h)){
          if(has('lance_pierce'))e.armor=0; // pierce bypasses armor
          if(damageEnemy(i,dmg))burst(e.x+e.w/2,e.y+e.h/2,'#ff8844',6);
        }
      }
      if(has('lance_vault'))p.vy=-5.5; // vault leap
      burst(p.x+(p.facingR?PW+22:-22),p.y+PH/2,'#ff8844',5);sfx('hit');
      } // end lance_spin else
    } else if(run.weapon==='bomb'){
      p.atkTimer=10;p.atkCd=Math.round(TOME_ATK_CD*(has('bomb_fast')?0.6:1)*cdMult);
      const dir=p.facingR?1:-1;const cnt=has('bomb_double')?2:1;
      let brad=has('bomb_mega')?52:32;if(has('bomb_radius'))brad=Math.round(brad*1.4);
      for(let b=0;b<cnt;b++){
        projectiles.push({x:p.x+PW/2+b*dir*6,y:p.y,
          vx:dir*(3.5+b*0.5),vy:-4.2,type:'bomb',life:90,pierce:false,
          radius:brad,sticky:has('bomb_sticky')});
      }
      burst(p.x+(p.facingR?PW:0),p.y,'#ff4400',5);
    } else if(run.weapon==='boomerang'){
      p.atkTimer=10;p.atkCd=Math.round(BASE_ATK_CD*0.9*cdMult);
      const dir=p.facingR?1:-1;const dmg=has('rang_power')?2:1;
      const cnt=has('boomr_tri')?3:has('rang_multi')?2:1;
      for(let b=0;b<cnt;b++){
        const bvy=has('boomr_tri')?(b-1)*1.8:0;
        projectiles.push({x:p.x+PW/2,y:p.y+PH/2+b*7,
          vx:dir*4.8,vy:bvy,type:'boomerang',life:80,pierce:has('boomr_pierce'),
          returning:false,dmg,rangStun:has('rang_stun'),wide:has('rang_wide'),
          gravity:has('boomr_gravity')});
      }
      burst(p.x+(p.facingR?PW:0),p.y+PH/2,'#ffc040',5);
    }
  }}

  // dash — only unlocked after weapon pick
  if(dashKey&&(p.dashCd===0||(has('extra_dash')&&p.dashExtra>0))&&run.weapon!==null){
    let cd=has('dash_cd')?Math.round(BASE_DASH_CD*0.7):BASE_DASH_CD;
    if(hasSigil(1))cd=Math.round(cd*0.9); // mainspring: -10% dash CD
    if(p.dashCd>0)p.dashExtra=0;
    p.dashTimer=DASH_DUR;p.dashCd=cd;lanceHitSet.clear();
    let dx=(right?1:0)-(left?1:0);
    let dy=(down?1:0)-(up?1:0);
    if(dx===0&&dy===0)dx=p.facingR?1:-1;
    const len=Math.sqrt(dx*dx+dy*dy);
    p.dashDirX=dx/len;p.dashDirY=dy/len;
    p.vx=DASH_SPEED*p.dashDirX;p.vy=DASH_SPEED*p.dashDirY;
    burst(p.x+PW/2,p.y+PH/2,'#aaf',12);
  }

  const wasOnGround=p.onGround,preVy=p.vy;
  physStep(p,getAllPlats(),isAquatic?0.15:isCelestial?0.2:GRAV,isAquatic?3:isCelestial?5:MAX_VY);

  // wall_cling: slow fall when pressing into a wall while airborne
  if(has('wall_cling')&&!p.onGround){
    const plats=getAllPlats();
    const clingL=left&&plats.some(([px,py,pw,ph])=>ov(p.x-2,p.y+2,2,PH-4,px,py,pw,ph));
    const clingR=right&&plats.some(([px,py,pw,ph])=>ov(p.x+PW,p.y+2,2,PH-4,px,py,pw,ph));
    if(clingL||clingR){p.vy=Math.min(p.vy,0.5);p.wallClingDir=clingL?1:-1;}
    else p.wallClingDir=0;
  } else p.wallClingDir=0;

  // conveyor push: slide player when standing on a moving platform
  if(p.onGround){
    for(const m of movingPlatEntities){
      if(ov(p.x,p.y+PH-2,PW,3,m.x,m.y,m.w,m.h)){
        p.x=clamp(p.x+m.vx,0,(currentRoom.w||W)-PW);break;
      }
    }
  }

  // crystal bounce platforms
  if(curTI()===4&&p.onGround&&!wasOnGround&&preVy>1.5){
    for(const [bx,by,bw,bh] of getAllPlats()){
      if(bw<300&&ov(p.x,p.y+PH-1,PW,2,bx,by,bw,bh)){
        p.vy=Math.max(-(preVy*0.75+3.5),-9);p.onGround=false;
        burst(p.x+PW/2,p.y+PH,'#e040fb',8);sfx('hit');break;
      }
    }
  }
  // frozen ice slide sparkles
  if(isFrozen&&p.onGround&&Math.abs(p.vx)>1.5&&Math.random()<0.35)
    burst(p.x+(p.vx>0?0:PW),p.y+PH,'#c0e8ff',1);
  // volcanic lava damage
  if(lavaY!==null&&p.y+PH>lavaY&&p.iframes===0){
    sfx('hurt');if(p.shieldUp){p.shieldUp=false;}else{run.hp--;}
    if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});return;}
    p.vy=-5;p.iframes=70;burst(p.x+PW/2,p.y+PH/2,'#ff4400',14);
  }

  // stomp
  if(!p.onGround&&p.vy>1)p.stomping=true;
  if(p.onGround)p.stomping=false;

  if(p.iframes>0)p.iframes--;

  // Void fall recovery
  if(p.y>380&&p.iframes===0){
    sfx('hurt');
    if(p.shieldUp){p.shieldUp=false;}else{run.hp--;}
    if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});return;}
    p.iframes=90;
    p.x=currentRoom.spawn[0];p.y=currentRoom.spawn[1];p.vx=0;p.vy=0;
    burst(p.x+PW/2,p.y+PH/2,'#f44',12);
  }
}

function updateEnemyType(e){
  if(e.iframes>0)e.iframes--;
  const eti=curTI();
  const ecx=e.x+e.w/2,ecy=e.y+e.h/2;
  const pdx=(p.x+PW/2)-ecx,pdy=(p.y+PH/2)-ecy;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy)||1;
  switch(e.type){
    case 'drone': {
      const droneHover=(e.platY||224)-62;
      e.vy+=(droneHover-e.y)*0.04-GRAV;
      e.vy=clamp(e.vy,-3.5,2.5);
      e.vx=lerp(e.vx,pdx>0?0.5:-0.5,0.04);
      if(e.atkCd<=0){
        e.atkCd=75+Math.floor(Math.random()*35);
        enemyProjs.push({x:ecx,y:e.y+e.h,vx:pdx/pdist,vy:2.8,life:90,col:THEMES[eti].accent,r:2});
      }
      break;}
    case 'sawbot':
      if(!e.sawCharging&&e.atkCd<=0&&Math.abs(pdx)<150&&e.onGround){
        e.sawCharging=true;e.atkCd=60+Math.floor(Math.random()*30);
        e.vx=(pdx>0?1:-1)*2.8;burst(ecx,ecy,'#ff9900',6);sfx('hit');
      }
      if(e.sawCharging){e.vx=(e.vx>0?1:-1)*2.8;if(e.atkCd<=15)e.sawCharging=false;}
      break;
    case 'turret':
      e.vx=0;
      if(e.atkCd<=0){
        e.atkCd=65+Math.floor(Math.random()*30);
        for(const ang of [-0.3,0,0.3]){
          const c=Math.cos(ang),s=Math.sin(ang);
          enemyProjs.push({x:ecx,y:ecy,vx:pdx/pdist*2.6*c-pdy/pdist*2.6*s,vy:pdx/pdist*2.6*s+pdy/pdist*2.6*c,life:100,col:THEMES[eti].accent,r:2});
        }
      }
      break;
    case 'lavabat':
      if(e.atkCd<=0&&e.onGround){
        e.atkCd=95+Math.floor(Math.random()*40);
        e.vy=-7.5;e.vx=(pdx>0?1:-1)*1.6;burst(ecx,ecy,'#ff4400',8);sfx('hit');
      }
      if(!e.onGround)e.vx=lerp(e.vx,(pdx>0?1:-1)*2.0,0.03);
      break;
    case 'voideye':
      if(e.atkCd<=0){
        const bx=e.x;e.atkCd=85+Math.floor(Math.random()*40);
        e.x=clamp(bx+pdx*0.6,e.platX,e.platRight-e.w);
        burst(bx+e.w/2,ecy,'#cc00ff',8);burst(e.x+e.w/2,ecy,'#cc00ff',8);sfx('hit');
      }
      break;
    case 'seraph': // resurrection handled in killEnemy
    case 'craboid': // armor handled via e.armor in damageEnemy
    default: break;
  }
  // World-specific enemy behaviors
  if(eti===1){ // Clockwork: periodic overclock burst
    if(e._ock===undefined)e._ock=Math.floor(Math.random()*140);
    e._ock++;
    if(e._ock%140<28&&e.onGround&&e.type!=='turret')e.vx=clamp(e.vx*1.04,-1.9,1.9);
  }
  if(eti===5){ // Abyss: ground enemies fire tracking orbs
    if(e.type!=='drone'&&e.type!=='turret'){
      if(e._abCd===undefined)e._abCd=120+Math.floor(Math.random()*60);
      e._abCd--;
      if(e._abCd<=0){
        e._abCd=110+Math.floor(Math.random()*50);
        const dx=(p.x+PW/2)-ecx,dy=(p.y+PH/2)-ecy;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        enemyProjs.push({x:ecx,y:ecy,vx:dx/d*1.6,vy:dy/d*1.6,life:120,col:THEMES[5].accent,r:2});
      }
    }
  }
  if(eti===7){ // Void: blink-teleport when hit
    if(e._blinkCd===undefined)e._blinkCd=0;
    if(e._blinkCd>0)e._blinkCd--;
    if(e.iframes>40&&e._blinkCd===0){
      e._blinkCd=45;
      const nx=clamp(e.platX+Math.random()*(e.platRight-e.platX-e.w),e.platX,e.platRight-e.w);
      burst(ecx,ecy,'#7c4dff',6);
      e.x=nx;
      burst(e.x+e.w/2,ecy,'#7c4dff',6);
    }
  }
  if(eti===8){ // Celestial: reduced gravity when airborne
    if(!e.onGround&&e.vy>-1.5)e.vy=Math.max(e.vy-0.04,-1.2);
  }
  if(eti===9){ // Aquatic: sine-wave bobbing
    if(e._bob===undefined)e._bob=Math.random()*Math.PI*2;
    e._bob+=0.06;
    if(!e.onGround)e.vy=clamp(e.vy+Math.sin(e._bob)*0.12,-2,2);
  }
  // EB-1: Grasslands burrow trigger
  if(eti===0&&!e._burrowUsed&&!e._burrowed&&e.hp>0&&e.hp<=e.maxHp/2){
    e._burrowed=true;e._burrowUsed=true;e._burrowFr=60;
  }
  // EB-2: Frozen pulse — slow player
  if(eti===2){
    if(e._pulseCd===undefined)e._pulseCd=120+Math.floor(Math.random()*120);
    e._pulseCd--;
    if(e._pulseCd<=0){
      e._pulseCd=240;burst(ecx,ecy,'#80d8ff',10);
      const dx2=ecx-(p.x+PW/2),dy2=ecy-(p.y+PH/2);
      if(Math.sqrt(dx2*dx2+dy2*dy2)<80)p.frozenFr=Math.max(p.frozenFr,90);
    }
  }
  // EB-3: Storm static charge → chain lightning
  if(eti===3){
    if(e._charge===undefined)e._charge=0;
    if(e._charge<180)e._charge++;
    if(e._charge>=180){
      e._charge=0;burst(ecx,ecy,'#4fc3f7',18);
      const dx2=(p.x+PW/2)-ecx,dy2=(p.y+PH/2)-ecy;
      if(Math.sqrt(dx2*dx2+dy2*dy2)<80){
        if(p.shieldUp){p.shieldUp=false;}
        else if(p.iframes===0){run.hp--;p.iframes=60;sfx('hurt');burst(p.x+PW/2,p.y+PH/2,'#90caf9',10);}
        if(run.hp<=0)fadeTo(()=>{STATE='GAME_OVER';});
      }
      for(let k=enemies.length-1;k>=0;k--){
        if(enemies[k]===e)continue;
        const oe=enemies[k],ex2=oe.x+oe.w/2-ecx,ey2=oe.y+oe.h/2-ecy;
        if(Math.sqrt(ex2*ex2+ey2*ey2)<80)damageEnemy(k,1);
      }
    }
  }
}

function updateEnemies(){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.stunTimer>0){e.stunTimer--;continue;}
    if(e.poisonTimer>0){e.poisonTimer--;if(e.poisonTimer%60===0){burst(e.x+e.w/2,e.y+e.h/2,'#00ff44',4);damageEnemy(i,1);if(!enemies[i]||enemies[i]!==e)continue;}}
    if(e.curseTimer>0){e.curseTimer--;if(e.curseTimer%30===0){burst(e.x+e.w/2,e.y+e.h/2,'#cc44ff',4);damageEnemy(i,1);if(!enemies[i]||enemies[i]!==e)continue;}}
    // EB-1: Burrowed grasslands enemies skip physics + combat
    if(e._burrowed){
      if(e._burrowFr>52)e.y+=1.5;
      e._burrowFr--;
      if(e._burrowFr<=0){e._burrowed=false;e.hp=e.maxHp;burst(e.x+e.w/2,e.y+e.h/2,'#7ec850',10);}
      continue;
    }
    if(e.onGround&&!e.sawCharging)e.vx=clamp(e.vx,-0.8,0.8);
    if(e.x<=e.platX){e.vx=Math.abs(e.vx);}
    if(e.x+e.w>=e.platRight){e.vx=-Math.abs(e.vx);}
    physStep(e,currentRoom.plats);

    // dash strike (dagger upgrade)
    if(has('dash_strike')&&p.dashTimer>0&&p.iframes===0){
      if(ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)){
        if(damageEnemy(i,1)){burst(e.x+e.w/2,e.y+e.h/2,'#aaf',6);}
        p.iframes=10;
        continue;
      }
    }
    // lance charge (lance upgrade): hits enemies along dash path
    if(has('lance_charge')&&p.dashTimer>0&&!lanceHitSet.has(e)){
      const lcx=p.facingR?p.x:p.x-36;
      if(ov(lcx,p.y,PW+36,PH,e.x,e.y,e.w,e.h)){
        lanceHitSet.add(e);
        const lcdmg=has('lance_heavy')?2:1;
        if(damageEnemy(i,lcdmg))burst(e.x+e.w/2,e.y+e.h/2,'#ff8844',6);
      }
    }

    // stomp kill
    if(p.stomping&&ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)&&p.vy>0){
      const dmg=has('stomp_dmg')?2:1;
      if(damageEnemy(i,dmg)){burst(e.x+e.w/2,e.y,'#f84',8);}
      p.vy=-4;p.iframes=20;
      if(has('area_stomp')){for(const other of enemies){if(other!==e&&Math.abs(other.x-e.x)<50)other.stunTimer=60;}}
      continue;
    }

    // player damage
    if(ov(p.x,p.y,PW,PH,e.x,e.y,e.w,e.h)&&p.iframes===0){
      if(p.shieldUp){p.shieldUp=false;}
      else{run.hp--;p.iframes=60;burst(p.x+PW/2,p.y+PH/2,'#f44',10);if(has('thorns'))damageEnemy(i,1);}
      if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});return;}
    }

    // Tier-based enemy attacks
    if(e.atkCd>0)e.atkCd--;
    const skipTierAtk=e.type==='drone'||e.type==='sawbot'||e.type==='turret'||e.type==='lavabat'||e.type==='voideye';
    if(e.atkCd===0&&e.stunTimer===0&&e.onGround&&!skipTierAtk){
      const ti=run.themeIdx; // floor-based tier for attack pattern difficulty
      const eti=curTI();     // theme-based for visuals + theme-specific behaviors
      const ecx=e.x+e.w/2,ecy=e.y+e.h/2;
      const dx=(p.x+PW/2)-ecx,dy=(p.y+PH/2)-ecy;
      const dist=Math.sqrt(dx*dx+dy*dy)||1;
      if(ti===1||ti===2){
        // Charge toward player
        e.vx=dx/dist*3;e.vy=-2.5;
        e.atkCd=80+Math.floor(Math.random()*60);
      } else if(ti===3||ti===4){
        // Fire single projectile
        enemyProjs.push({x:ecx,y:ecy,vx:dx/dist*2.2,vy:dy/dist*2.2,life:85,col:THEMES[eti].accent,r:2});
        e.atkCd=75+Math.floor(Math.random()*45);
      } else if(ti===5||ti===6){
        // Fire spread-2 projectiles
        for(const ang of [-0.3,0,0.3]){const cos=Math.cos(ang),sin=Math.sin(ang);enemyProjs.push({x:ecx,y:ecy,vx:dx/dist*2.4*cos-dy/dist*2.4*sin,vy:dx/dist*2.4*sin+dy/dist*2.4*cos,life:90,col:THEMES[eti].accent,r:2});}
        e.atkCd=85+Math.floor(Math.random()*55);
      } else if(ti>=7){
        // Fan3 + void blink
        if(eti===7&&Math.random()<0.3){e.x=clamp(p.x+(Math.random()<0.5?-60:60),e.platX,e.platRight-e.w);burst(e.x+e.w/2,e.y,'#cc00ff',8);}
        for(const ang of [-0.4,0,0.4]){const cos=Math.cos(ang),sin=Math.sin(ang);enemyProjs.push({x:ecx,y:ecy,vx:dx/dist*2.6*cos-dy/dist*2.6*sin,vy:dx/dist*2.6*sin+dy/dist*2.6*cos,life:95,col:THEMES[eti].accent,r:2});}
        e.atkCd=75+Math.floor(Math.random()*40);
      }
    }
    updateEnemyType(e);
  }
  if(enemies.length===0&&!roomEnemiesCleared){
    if(eliteRoom&&eliteWave===0){
      // E-3: Start wave 2 intermission
      eliteWave=1;eliteWaveTimer=60;
    } else if(!eliteRoom||eliteWave===2){
      roomEnemiesCleared=true;if(currentRoom.type!=='treasure')exitOpen=true;
      if(eliteRoom){
        // E-5: Elite clear reward
        const bonus=meta.perks.includes('bargain')?10:8;
        run.shards+=bonus;
        for(let k=0;k<8;k++)spawnShard(exitX-30+Math.random()*60,exitY-10+Math.random()*10);
        burst(exitX,exitY,'#e040fb',24);sfx('boss');eliteClearFrames=36;
      } else {
        spawnShard(exitX-20,exitY-8);
        burst(exitX,exitY,'#ff0',12);
      }
    }
  }
}

function updateDrops(){
  const magnet=has('coin_mag');
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];
    if(d.collected)continue;
    d.vy=Math.min(d.vy+GRAV,MAX_VY);
    if(magnet){
      const dx=(p.x+PW/2)-(d.x);
      const dy=(p.y+PH/2)-(d.y);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<60){d.vx+=dx/dist*0.5;d.vy+=dy/dist*0.5;}
    }
    d.x+=d.vx;d.y+=d.vy;
    for(const [px,py,pw,ph] of currentRoom.plats){
      if(ov(d.x,d.y,4,4,px,py,pw,ph)){d.vy=0;d.vx*=0.8;d.y=py-4;}
    }
    d.x=clamp(d.x,0,W-4);
    if(ov(p.x-4,p.y-4,PW+8,PH+8,d.x,d.y,4,4)){
      if(d.type==='sigil'){
        applySigil(d.worldIdx);
        burst(d.x+6,d.y+6,THEMES[d.worldIdx]?THEMES[d.worldIdx].accent:'#ffd700',16);
        drops.splice(i,1);continue;
      }
      if(d.type==='coin'){run.coins++;if(hasSigil(5))run.shards++;} // tidemark
      else{if(has('heart_shard'))run.hp=Math.min(run.hp+1,run.maxHp);run.shards++;}
      burst(d.x,d.y,d.type==='coin'?'#ff0':'#e040fb',4);
      drops.splice(i,1);
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.08;pt.life-=0.04;
    if(pt.life<=0)particles.splice(i,1);
  }
}

function updateEnemyProjs(){
  for(let i=enemyProjs.length-1;i>=0;i--){
    const proj=enemyProjs[i];
    proj.x+=proj.vx;proj.y+=proj.vy;proj.life--;
    if(proj.life<=0){enemyProjs.splice(i,1);continue;}
    let dead=false;
    for(const[px,py,pw,ph] of currentRoom.plats){
      if(ov(proj.x-proj.r,proj.y-proj.r,proj.r*2,proj.r*2,px,py,pw,ph)){dead=true;break;}
    }
    if(dead){enemyProjs.splice(i,1);continue;}
    // Elite wall seal: clip projectiles at screen edges
    if(eliteRoom&&!roomEnemiesCleared){const sx=proj.x-cameraX;if(sx+proj.r<2||sx-proj.r>W-2){enemyProjs.splice(i,1);continue;}}
    // stormeye: 5% chance to redirect projectile back
    if(hasSigil(3)&&Math.random()<0.05){proj.vx=-proj.vx;proj.vy=-proj.vy;}
    if(p.iframes===0&&ov(p.x,p.y,PW,PH,proj.x-proj.r,proj.y-proj.r,proj.r*2,proj.r*2)){
      if(p.shieldUp){p.shieldUp=false;}
      else{run.hp--;p.iframes=60;sfx('hurt');burst(p.x+PW/2,p.y+PH/2,'#f44',10);}
      if(run.hp<=0)fadeTo(()=>{STATE='GAME_OVER';});
      enemyProjs.splice(i,1);
    }
  }
}

function updateHazards(){
  for(let i=hazards.length-1;i>=0;i--){
    const h=hazards[i];h.timer--;
    if(h.timer<=0){hazards.splice(i,1);continue;}
    if(p.iframes===0&&ov(p.x,p.y,PW,PH,h.x,h.y,h.w,h.h)){
      if(p.shieldUp){p.shieldUp=false;}
      else{run.hp--;p.iframes=60;sfx('hurt');burst(p.x+PW/2,p.y+PH/2,'#f44',10);}
      if(run.hp<=0)fadeTo(()=>{STATE='GAME_OVER';});
    }
  }
}

function drawEnemyProjs(){
  for(const proj of enemyProjs){
    cx.save();cx.shadowColor=proj.col;cx.shadowBlur=7;
    cx.fillStyle=proj.col;cx.beginPath();cx.arc(proj.x,proj.y,proj.r,0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

function drawHazards(){
  for(const h of hazards){
    const alpha=Math.min(1,h.timer/30)*0.7;
    cx.save();cx.globalAlpha=alpha;cx.fillStyle=h.col;cx.fillRect(Math.round(h.x),Math.round(h.y),h.w,h.h);
    cx.save();cx.shadowColor=h.col;cx.shadowBlur=10;cx.fillStyle=h.col;cx.fillRect(Math.round(h.x),Math.round(h.y),h.w,3);cx.restore();
    cx.restore();
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawCloud(x,y,w,color){
  cx.fillStyle=color;cx.beginPath();
  cx.ellipse(x,y,w*0.5,4,0,0,Math.PI*2);
  cx.ellipse(x-w*0.25,y+1,w*0.3,3,0,0,Math.PI*2);
  cx.ellipse(x+w*0.3,y,w*0.35,3.5,0,0,Math.PI*2);
  cx.fill();
}
function rotatingGear(gx,gy,r,teeth,color,ang){
  cx.save();cx.translate(gx,gy);cx.rotate(ang);
  cx.fillStyle=color;cx.beginPath();cx.arc(0,0,r,0,Math.PI*2);cx.fill();
  for(let i=0;i<teeth;i++){const a=(i/teeth)*Math.PI*2;cx.fillRect(Math.cos(a)*(r+2)-3,Math.sin(a)*(r+2)-3,6,6);}
  cx.globalCompositeOperation='destination-out';
  cx.beginPath();cx.arc(0,0,r*0.42,0,Math.PI*2);cx.fill();
  cx.restore();
}

// Room decoration — purely visual elements drawn behind platforms
function drawRoomDecor(){
  const k=curThemeKey();
  const seed=run.roomIdx*37+run.themeIdx*101;
  const floorY=224;
  if(k==='grasslands'){
    // rolling hills
    for(let i=0;i<3;i++){const s=hash(seed+i*17);const hx=(s%50)*8;const hw=60+i*22;cx.fillStyle='#2a5c1a';cx.beginPath();cx.ellipse(hx+hw/2,floorY,hw/2,6+i*2,0,Math.PI,0,true);cx.fill();}
    // flowers
    for(let i=0;i<6;i++){const s=hash(seed+i*31+7);const fx=(s*53)%560+20;cx.fillStyle=i%2?'#ff80aa':'#ffff60';cx.fillRect(fx,floorY-3,2,2);}
    // puddle (dark dungeon water, animated shimmer)
    const ps=hash(seed+99);const ppx=(ps*37)%380+60;
    cx.fillStyle='rgba(15,30,80,0.85)';cx.fillRect(ppx,floorY-3,26,3);
    cx.fillStyle='rgba(40,80,160,0.5)';cx.fillRect(ppx+1,floorY-3,24,1);
    const ripT=Math.floor(sec()*3)%3;
    cx.fillStyle=ripT===0?'rgba(80,140,255,0.35)':ripT===1?'rgba(60,120,220,0.25)':'rgba(100,160,255,0.3)';
    cx.fillRect(ppx+3,floorY-3,5,1);cx.fillRect(ppx+15,floorY-3,4,1);
  } else if(k==='clockwork'){
    // pipes along floor
    for(let i=0;i<2;i++){const s=hash(seed+i*23);const ppx=(s*47)%400+40;cx.fillStyle='#8b5e30';cx.fillRect(ppx,floorY-6,48,6);cx.fillStyle='#c8973c';cx.fillRect(ppx,floorY-6,48,2);cx.fillStyle='#5b3c1a';cx.fillRect(ppx+20,floorY-12,8,6);}
    // floor gears
    for(let i=0;i<2;i++){const s=hash(seed+i*41+5);const gx=(s*53)%500+40;const gy=floorY-5;cx.fillStyle='#c8973c';cx.beginPath();cx.arc(gx,gy,5,0,Math.PI*2);cx.fill();cx.fillStyle='#8b5e30';cx.fillRect(gx-1,gy-7,2,4);cx.fillRect(gx-1,gy+3,2,4);cx.fillRect(gx-7,gy-1,4,2);cx.fillRect(gx+3,gy-1,4,2);}
  } else if(k==='frozen'){
    // snow drifts
    for(let i=0;i<4;i++){const s=hash(seed+i*19);const dx=(s*53)%520+20;const dw=30+i*12;cx.fillStyle='rgba(220,240,255,0.7)';cx.beginPath();cx.ellipse(dx+dw/2,floorY,dw/2,5+i,0,Math.PI,0,true);cx.fill();}
    // ceiling icicle clusters (visual only)
    for(let i=0;i<3;i++){const s=hash(seed+i*61+3);const ix=(s*47)%540+30;cx.fillStyle='#a0d8f0';for(let j=0;j<4;j++){const jh=5+hash(seed+i*11+j*7)%7;cx.fillRect(ix+j*4,0,2,jh);}}
  } else if(k==='storm'){
    // puddles
    for(let i=0;i<3;i++){const s=hash(seed+i*29);const ppx=(s*41)%460+40;cx.fillStyle='rgba(100,160,220,0.4)';cx.fillRect(ppx,floorY-2,20+i*8,2);}
    // lightning crack on floor
    const lx=hash(seed+77)%400+80;cx.fillStyle='rgba(180,210,255,0.3)';cx.fillRect(lx,floorY-1,40,1);
  } else if(k==='crystal'){
    // geode clusters at floor
    for(let i=0;i<3;i++){const s=hash(seed+i*37);const cx2=(s*53)%480+40;for(let j=0;j<3;j++){const ch=5+hash(seed+i*7+j*11)%8;const ci=cx2+j*6-6;cx.fillStyle=j%2?'#e040fb':'#ff80ff';cx.beginPath();cx.moveTo(ci,floorY);cx.lineTo(ci+3,floorY);cx.lineTo(ci+1,floorY-ch);cx.closePath();cx.fill();cx.fillStyle='#fff';cx.fillRect(ci,floorY-ch,1,1);}}
  } else if(k==='abyss'){
    // glowing fungi clusters
    for(let i=0;i<4;i++){const s=hash(seed+i*43);const fx=(s*53)%520+20;cx.save();cx.shadowColor='#00e5cc';cx.shadowBlur=8;cx.fillStyle='#00c0a0';cx.fillRect(fx,floorY-8,4,8);cx.fillStyle='#00ffee';cx.fillRect(fx-3,floorY-10,10,4);cx.restore();}
  } else if(k==='volcanic'){
    // lava cracks along floor
    for(let i=0;i<4;i++){const s=hash(seed+i*53);const cx2=(s*41)%460+40;cx.fillStyle='#ff4400';cx.fillRect(cx2,floorY-1,16+i*6,1);cx.fillStyle='rgba(255,100,0,0.35)';cx.fillRect(cx2-1,floorY-2,18+i*6,1);}

    for(let i=0;i<6;i++){const s=hash(seed+i*37);const sx2=(s*47)%540+20;cx.fillStyle='rgba(255,215,0,0.4)';cx.fillRect(sx2,floorY-1,2,1);}

// Ambient world particles (fireflies, snow, rain, etc.)
function drawAmbientParticles(k,t,seed){
  if(k==='grasslands'){
    cx.fillStyle='rgba(255,250,200,0.85)';
    for(let i=0;i<18;i++){const s=seed*11+i*37;const sx=((s*53+t*0.6)%640+640)%640;const sy=80+(((s*29)+t*0.3)%150);cx.fillRect(Math.floor(sx+Math.sin(t*0.04+i)*1.5),Math.floor(sy),1,1);}
    for(let i=0;i<10;i++){const s=seed*23+i*101;const blink=Math.sin(t*0.1+i*1.7);if(blink>0.3){cx.fillStyle=`rgba(255,240,120,${0.4+blink*0.5})`;cx.fillRect(20+((s*7)%600),120+((s*13)%80),2,1);}}
  } else if(k==='clockwork'){
    for(let i=0;i<12;i++){const s=seed*17+i*53;const cycle=((t*0.7+i*40)%180);const alpha=Math.max(0,0.35*(1-cycle/180));cx.fillStyle=`rgba(220,210,190,${alpha})`;cx.fillRect((s*7)%640,200-cycle,1+Math.floor(cycle/60),1+Math.floor(cycle/60));}
  } else if(k==='frozen'){
    for(let i=0;i<55;i++){const s=seed*7+i*43;const sx=((s*53+Math.sin((s+t*0.05))*8)%640+640)%640;const sy=((t*0.6+s*11)%260)-10;cx.fillStyle=i%3===0?'rgba(255,255,255,0.9)':'rgba(220,235,255,0.65)';cx.fillRect(Math.floor(sx),Math.floor(sy),1,1);}
  } else if(k==='storm'){
    cx.fillStyle='rgba(180,210,255,0.55)';
    for(let i=0;i<70;i++){const s=seed*3+i*29;const fall=((t*4+s*7)%280)-20;cx.fillRect(((s*53)%640)-(fall*0.15)|0,fall,1,3);}
  } else if(k==='crystal'){
    for(let i=0;i<32;i++){const s=seed*13+i*47;const cycle=((t*0.5+s*7)%240);const sy=230-cycle;const alpha=0.3+0.5*Math.sin(t*0.12+i);if(alpha>0.4){cx.fillStyle=`rgba(${i%3===0?'255,200,255':i%3===1?'255,255,255':'200,150,255'},${alpha})`;cx.fillRect((s*53)%640,sy,1,1);}}
  } else if(k==='abyss'){
    for(let i=0;i<22;i++){const s=seed*19+i*61;const sy=220-((t*0.22+s*3)%230);const alpha=0.28+0.4*Math.sin(t*0.07+i*1.1);cx.fillStyle=`rgba(0,220,180,${alpha})`;cx.fillRect(((s*53)%570)+20,Math.floor(sy),1,1);}
  } else if(k==='volcanic'){
    // fast embers
    for(let i=0;i<20;i++){const s=seed*11+i*43;const rise=(t*(1.8+i%4*0.4)+s*3)%290;const sy=230-rise;if(sy>-2){const alpha=Math.max(0,(1-rise/240)*0.8);const col=i%4===0?`rgba(255,240,80,${alpha})`:i%4===1?`rgba(255,160,0,${alpha})`:`rgba(255,${(50+s%120)|0},0,${alpha})`;cx.fillStyle=col;cx.fillRect(((s*53+Math.sin(rise*0.12+i)*5)|0)%570+20,Math.floor(sy),1+i%3,rise%3+1);}}
    // slow smoke
    for(let i=0;i<6;i++){const s=seed*29+i*67;const rise=(t*0.6+s*2)%270;const sy=230-rise;const alpha=Math.max(0,(1-rise/240)*0.18);cx.fillStyle=`rgba(20,8,0,${alpha})`;cx.fillRect(((s*71)%560)+20+(Math.sin(rise*0.04+i)*5|0),Math.floor(sy),3+i%3,4);}
  } else if(k==='void'){
    for(let i=0;i<24;i++){const s=seed*23+i*71;const sx=((s*53+Math.sin(t*0.04+i)*4)%570+20);const sy=((t*0.32+s*7)%250);const alpha=0.38+0.5*Math.sin(t*0.09+i*1.3);cx.fillStyle=`rgba(${150+i%80},0,${200+i%55},${alpha})`;cx.fillRect(Math.floor(sx),Math.floor(sy),1,1);}
  } else if(k==='celestial'){
    // rising golden motes
    for(let i=0;i<36;i++){const s=seed*31+i*53;const sx=((s*47+Math.sin(t*0.03+i)*7)%570+20);const sy=230-((t*(0.2+i%4*0.08)+s*9)%250);const alpha=0.3+0.6*Math.abs(Math.sin(t*0.06+i*1.7));if(alpha>0.3){const col=i%3===0?`rgba(255,255,180,${alpha})`:i%3===1?`rgba(255,215,0,${alpha})`:`rgba(200,140,255,${alpha*0.7})`;cx.fillStyle=col;cx.fillRect(Math.floor(sx),Math.floor(sy),alpha>0.7?2:1,1);}}
    // slow-drifting large sparkles
    for(let i=0;i<8;i++){const s=seed*71+i*101;const sx=((s*53+Math.sin(t*0.02+i)*10)%580+20)|0;const sy=(110+i*14+(Math.sin(t*0.015+i*2)*12)|0);const blink=0.5+0.5*Math.sin(t*0.1+i*2.3);cx.fillStyle=`rgba(255,240,100,${blink*0.6})`;cx.fillRect(sx,sy,2,2);cx.fillStyle=`rgba(255,255,200,${blink*0.3})`;cx.fillRect(sx-1,sy,4,1);cx.fillRect(sx,sy-1,1,4);}
  } else if(k==='aquatic'){
    // rising bubbles — varied size + wobble
    for(let i=0;i<25;i++){const s=seed*13+i*41;const rise=(t*(0.35+i%5*0.1)+s*6)%260;const sy=230-rise;const sx=((s*53+Math.sin(rise*0.1+i)*6)|0+580)%580+20;const alpha=Math.max(0,(1-rise/240)*0.6);if(alpha<0.05)continue;const sz=1+i%3;cx.fillStyle=`rgba(170,235,255,${alpha})`;cx.beginPath();cx.arc(Math.floor(sx),Math.floor(sy),sz,0,Math.PI*2);cx.fill();}
    // bioluminescent plankton sparkles
    for(let i=0;i<22;i++){const s=seed*71+i*53;const mx=((s*47+Math.sin(t*0.025+i)*8)%570)|0+20;const my=((s*23+Math.sin(t*0.018+i*1.3)*6)%200)|0+10;const blink=0.18+0.35*Math.abs(Math.sin(t*0.08+i*1.8));cx.fillStyle=`rgba(0,220,200,${blink})`;cx.fillRect(mx,my,1,1);}
  }
}

function drawBg(theme){
  const themeKey=curThemeKey();
  const t=sec()*60;
  const seed=run.roomIdx*7+run.themeIdx*31;
  // Sky gradient (full canvas, screen space)
  const grd=cx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,theme.skyTop);grd.addColorStop(0.5,theme.skyMid);grd.addColorStop(1,theme.skyBot);
  cx.fillStyle=grd;cx.fillRect(0,0,W,H);
  // Far static bg (parallax 8%, world Y offset)
  cx.save();cx.translate(-Math.round(cameraX*0.08),WORLD_YOFF);
  if(FAR_BG[themeKey])FAR_BG[themeKey](seed);cx.restore();
  // Dynamic bg (parallax 18%)
  cx.save();cx.translate(-Math.round(cameraX*0.18),WORLD_YOFF);
  if(DYN_BG[themeKey])DYN_BG[themeKey](t,seed);cx.restore();
  // Scanline grain
  cx.fillStyle='rgba(0,0,0,0.07)';for(let y=0;y<H;y+=2)cx.fillRect(0,y,W,1);
}

function drawPlatTop(x,y,w,k){
  const th=THEMES[curTI()];
  const seed=(x*7+y*13)|0;
  if(k==='grasslands'){
    cx.fillStyle=th.edgeHi;
    for(let sx=x;sx<x+w;sx+=3){const n=hash(seed+sx*5);cx.fillRect(sx,y-(2+n%4),1,2+n%4);}
    cx.fillStyle=th.surf;for(let sx=x+1;sx<x+w;sx+=4){if(hash(seed+sx*9)%3===0)cx.fillRect(sx,y-3,1,2);}
  } else if(k==='clockwork'){
    cx.fillStyle='rgba(201,163,110,0.7)';cx.fillRect(x,y-1,w,1);
    cx.fillStyle=th.surf;for(let sx=x+3;sx<x+w-2;sx+=7){cx.fillRect(sx,y-2,2,2);cx.fillStyle='#fff';cx.fillRect(sx,y-2,1,1);cx.fillStyle=th.surf;}
  } else if(k==='frozen'){
    cx.fillStyle='#ffffff';for(let sx=x;sx<x+w;sx+=2){const n=hash(seed+sx*7);cx.fillRect(sx,y-(1+n%3),1,1+n%3);}
    cx.fillStyle=th.surf;cx.fillRect(x,y-1,w,1);
  } else if(k==='storm'){
    cx.fillStyle='rgba(192,224,255,0.5)';cx.fillRect(x,y-1,w,1);
    cx.fillStyle=th.surf;for(let sx=x+2;sx<x+w-2;sx+=9){if(hash(seed+sx*11)%3===0){cx.fillRect(sx,y-2,1,2);cx.fillRect(sx-1,y-1,1,1);cx.fillRect(sx+1,y-1,1,1);}}
  } else if(k==='crystal'){
    for(let sx=x+1;sx<x+w-1;sx+=4){const ht=2+(hash(seed+sx*7)%5);cx.fillStyle=th.edgeSub;cx.fillRect(sx,y-ht,2,ht);cx.fillStyle=th.edgeHi;cx.fillRect(sx,y-ht,1,ht);cx.fillStyle=th.surf;cx.fillRect(sx,y-ht,1,1);}
  } else if(k==='abyss'){
    cx.fillStyle='#00e5cc';for(let sx=x;sx<x+w;sx+=2){const n=hash(seed+sx*5);cx.fillRect(sx,y-(1+n%3),1,1+n%3);}
    cx.fillStyle=th.surf;cx.fillRect(x,y-1,w,1);
  } else if(k==='volcanic'){
    // cracked magma crust — dark seams with glowing gaps
    cx.fillStyle='#1a0800';cx.fillRect(x,y-2,w,2);
    for(let sx=x+3;sx<x+w-3;sx+=7){const n=hash(seed+sx*13);const gw=1+(n%2);cx.fillStyle=`rgba(255,${50+n%70},0,0.9)`;cx.fillRect(sx+(n%3),y-2,gw,2);}
    cx.save();cx.shadowColor='#ff4400';cx.shadowBlur=4;cx.fillStyle='#ff3000';cx.fillRect(x,y-1,w,1);cx.restore();
  } else if(k==='void'){
    for(let sx=x;sx<x+w;sx+=3){const n=hash(seed+sx*7)%3;cx.fillStyle=n===0?'#cc00ff':n===1?'#880088':'#550055';cx.fillRect(sx,y-1-n,1,1+n);}
  } else if(k==='aquatic'){
    // coral stalks with bulb tips + seagrass strands
    for(let sx=x+3;sx<x+w-3;sx+=9){const n=hash(seed+sx*11);const sh=3+(n%6);const col=n%3===0?'#ff5040':n%3===1?'#ff3070':'#00c8a0';cx.fillStyle=col;cx.fillRect(sx,y-sh,2,sh);cx.fillRect(sx-1,y-sh,4,2);}
    for(let sx=x+7;sx<x+w-3;sx+=9){const n=hash(seed+sx*7+3);const sh=2+(n%4);cx.fillStyle='rgba(0,200,140,0.65)';cx.fillRect(sx,y-sh,1,sh);}
  } else {
    // celestial: stardust spikes with golden tips
    for(let sx=x+2;sx<x+w-2;sx+=5){const n=hash(seed+sx*11);const sh=2+(n%5);cx.fillStyle='rgba(255,215,0,0.75)';cx.fillRect(sx,y-sh,2,sh);cx.fillStyle='#ffffa0';cx.fillRect(sx,y-sh,1,1);}
    cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=4;cx.fillStyle='rgba(255,215,0,0.55)';cx.fillRect(x,y-1,w,1);cx.restore();
  }
}

function drawPlats(plats,theme){
  const k=curThemeKey();
  const TS=8;
  for(const plat of plats){
    const [x,y,w,h]=plat;
    cx.save();
    if(plat[4]){const v=(Math.sin(sec()*3.2+plat[4])+1)/2;cx.globalAlpha=Math.max(0.08,v*0.85+0.12);}
    cx.fillStyle=theme.body;cx.fillRect(x,y,w,h);
    cx.fillStyle=theme.seam;
    for(let tx=Math.ceil(x/TS)*TS;tx<x+w;tx+=TS)cx.fillRect(tx,y,1,h);
    for(let ty=Math.ceil(y/TS)*TS;ty<y+h;ty+=TS)cx.fillRect(x,ty,w,1);
    cx.fillStyle=theme.inner;
    const cx0=Math.ceil(x/TS)*TS,cy0=Math.ceil(y/TS)*TS;
    for(let bx=cx0;bx+TS<=x+w;bx+=TS)for(let by=cy0;by+TS<=y+h;by+=TS){cx.fillRect(bx+2,by+2,2,2);cx.fillRect(bx+TS-4,by+2,2,2);cx.fillRect(bx+2,by+TS-4,2,2);cx.fillRect(bx+TS-4,by+TS-4,2,2);}
    drawPlatTop(x,y,w,k);
    cx.fillStyle=theme.edgeHi;cx.fillRect(x,y,w,2);
    cx.fillStyle=theme.edgeSub;cx.fillRect(x,y+2,w,1);
    cx.fillStyle=theme.edgeHi+'38';cx.fillRect(x,y,1,h);
    cx.fillStyle='rgba(0,0,0,0.32)';cx.fillRect(x,y+h-2,w,2);
    cx.restore();
  }
}

function drawMovingPlats(theme){
  const k=curThemeKey();
  const t=sec()*60;
  const TS=8;
  for(const m of movingPlatEntities){
    const {x,y,w,h}=m;
    // base body (same as static plats)
    cx.fillStyle=theme.body;cx.fillRect(x,y,w,h);
    cx.fillStyle=theme.seam;
    for(let tx=Math.ceil(x/TS)*TS;tx<x+w;tx+=TS)cx.fillRect(tx,y,1,h);
    for(let ty=Math.ceil(y/TS)*TS;ty<y+h;ty+=TS)cx.fillRect(x,ty,w,1);
    cx.fillStyle=theme.inner;
    const cx0=Math.ceil(x/TS)*TS,cy0=Math.ceil(y/TS)*TS;
    for(let bx=cx0;bx+TS<=x+w;bx+=TS)for(let by=cy0;by+TS<=y+h;by+=TS){cx.fillRect(bx+2,by+2,2,2);cx.fillRect(bx+TS-4,by+2,2,2);cx.fillRect(bx+2,by+TS-4,2,2);cx.fillRect(bx+TS-4,by+TS-4,2,2);}
    // animated conveyor stripes (direction matches velocity)
    cx.save();
    cx.beginPath();cx.rect(x,y,w,h);cx.clip();
    const stripeW=10;
    const vel=m.vx;
    const offset=((t*(vel>=0?1:-1)*0.6)%stripeW+stripeW)%stripeW;
    cx.fillStyle='rgba(0,0,0,0.28)';
    for(let sx=x-stripeW+offset;sx<x+w+stripeW;sx+=stripeW){
      cx.fillRect(sx,y,stripeW*0.45,h);
    }
    cx.restore();
    // top decoration (reuse drawPlatTop logic)
    drawPlatTop(x,y,w,k);
    // gear pins at both ends (clockwork visual marker)
    cx.fillStyle=theme.accent;
    cx.fillRect(x+1,y+h/2-2,3,4);
    cx.fillRect(x+w-4,y+h/2-2,3,4);
    // top/bottom edges
    cx.fillStyle=theme.edgeHi;cx.fillRect(x,y,w,2);
    cx.fillStyle=theme.edgeSub;cx.fillRect(x,y+2,w,1);
    cx.fillStyle='rgba(0,0,0,0.32)';cx.fillRect(x,y+h-2,w,2);
  }
}

function glowRect(x,y,w,h,col,blur=8){
  cx.save();cx.shadowColor=col;cx.shadowBlur=blur;
  cx.fillStyle=col;cx.fillRect(x,y,w,h);cx.restore();
}

function drawPlayer(){
  const px=Math.round(p.x),py=Math.round(p.y);
  const fl=!p.facingR;
  const th=THEMES[curTI()];
  const t=sec()*60;
  // iframe flash
  if(p.iframes>0&&Math.floor(sec()*10)%2){cx.fillStyle='rgba(255,255,255,0.6)';cx.fillRect(px-1,py-1,PW+2,PH+2);return;}
  // legs
  cx.fillStyle='#1a1428';cx.fillRect(px,py+12,3,2);cx.fillRect(px+5,py+12,3,2);
  // body lower
  cx.fillStyle='#2a2540';cx.fillRect(px,py+8,8,4);
  // body upper
  cx.fillStyle='#4fc3f7';cx.fillRect(px,py+4,8,4);
  cx.fillStyle='#0a0810';cx.fillRect(px,py+8,8,1);
  // belt highlight
  cx.fillStyle='#ffd700';cx.fillRect(px+3,py+8,2,1);
  // head
  cx.fillStyle='#ffe0b2';cx.fillRect(px+1,py+1,6,4);
  cx.fillStyle='#111';cx.fillRect(fl?px+2:px+5,py+2,1,2);
  // theme scarf on top
  cx.fillStyle=th.accent;cx.fillRect(px,py-1,8,2);
  cx.fillStyle=th.glow;cx.fillRect(px+1,py-1,3,1);
  // glow
  cx.save();cx.shadowColor='#4fc3f7';cx.shadowBlur=6;
  cx.fillStyle='rgba(79,195,247,0.5)';cx.fillRect(px,py+4,8,1);cx.restore();
  // shield ring
  if(p.shieldUp){cx.save();cx.shadowColor='#90caf9';cx.shadowBlur=10;cx.strokeStyle='#90caf9';cx.lineWidth=1;cx.strokeRect(px-2,py-2,PW+4,PH+4);cx.restore();}
  // EB-2: Frost rim while slowed
  if(p.frozenFr>0){cx.save();cx.globalAlpha=0.4+0.3*Math.sin(sec()*0.08*60);cx.strokeStyle='#80d8ff';cx.lineWidth=1;cx.strokeRect(px-1,py-1,PW+2,PH+2);cx.restore();}
  // dash trail (cosmetic trail color if unlocked)
  if(p.dashTimer>0){const _tc=activeTrailCol()||'#aaf';cx.save();cx.shadowColor=_tc;cx.shadowBlur=6;cx.fillStyle=_tc+'66';cx.fillRect(px-p.dashDirX*8,py-p.dashDirY*8,PW,PH-4);cx.restore();}
  // weapon attack visual
  if(p.atkTimer>0){
    if(run.weapon==='dagger'){cx.save();cx.shadowColor='#4fc3f7';cx.shadowBlur=10;cx.fillStyle='rgba(79,195,247,0.75)';cx.fillRect(p.facingR?px+PW:px-14,py+2,14,10);cx.restore();}
    else if(run.weapon==='tome'){
      const maxR=has('blast_aoe')?80:50;
      const prog=1-(p.atkTimer/14);
      const r=maxR*prog;
      cx.save();cx.shadowColor='#e040fb';cx.shadowBlur=16;
      cx.strokeStyle=`rgba(224,64,251,${0.9-prog*0.7})`;cx.lineWidth=2;
      cx.beginPath();cx.arc(px+PW/2,py+PH/2,r,0,Math.PI*2);cx.stroke();
      cx.lineWidth=1;cx.strokeStyle=`rgba(255,160,255,${0.6-prog*0.5})`;
      for(let i=0;i<8;i++){const a=i*Math.PI/4;const ir=r*0.45;cx.beginPath();cx.moveTo(px+PW/2+Math.cos(a)*ir,py+PH/2+Math.sin(a)*ir);cx.lineTo(px+PW/2+Math.cos(a)*r,py+PH/2+Math.sin(a)*r);cx.stroke();}
      cx.restore();
    }
    else if(run.weapon==='lance'){
      const prog=p.atkTimer/12;
      const ext=Math.round(44*(1-prog*0.55));
      const lh=has('lance_wide')?PH*2:PH;const ly=py-(lh-PH)/2;
      const tipX=p.facingR?px+PW+ext:px-ext;
      const baseX=p.facingR?px+PW:px;
      cx.save();cx.shadowColor='#ff8844';cx.shadowBlur=12;
      cx.strokeStyle='rgba(255,136,68,0.85)';cx.lineWidth=3;
      cx.beginPath();cx.moveTo(baseX,py+PH/2);cx.lineTo(tipX,py+PH/2);cx.stroke();
      cx.fillStyle='#ffcc88';cx.shadowBlur=16;
      cx.beginPath();
      if(p.facingR){cx.moveTo(tipX,py+PH/2);cx.lineTo(tipX-7,ly+2);cx.lineTo(tipX-7,ly+lh-2);}
      else{cx.moveTo(tipX,py+PH/2);cx.lineTo(tipX+7,ly+2);cx.lineTo(tipX+7,ly+lh-2);}
      cx.closePath();cx.fill();
      cx.restore();
    }
    else if(run.weapon==='boomerang'){
      cx.save();cx.shadowColor='#ffc040';cx.shadowBlur=8;cx.fillStyle='rgba(255,192,64,0.6)';
      cx.beginPath();cx.arc(px+PW/2,py+PH/2,12,0,Math.PI*2);cx.stroke();cx.restore();
    }
  }
}

function drawBoss(){
  if(!bossEntity)return;
  const b=bossEntity;const bx=Math.round(b.x);const by=Math.round(b.y);
  const t=b.hp/b.maxHp;const ti=curTI();
  if(ti===0){
    const sw=b.onGround?34:26,sh=b.onGround?16:24;
    const ox=Math.round((b.w-sw)/2),oy=b.h-sh;
    const r=Math.round(lerp(60,120,t)),g=Math.round(lerp(200,220,t));
    const col=`rgb(${r},${g},60)`;
    cx.save();cx.shadowColor=col;cx.shadowBlur=14;cx.fillStyle=col;cx.fillRect(bx+ox,by+oy,sw,sh);cx.restore();
    cx.fillStyle=col;cx.fillRect(bx+ox,by+oy,sw,sh);
    cx.fillStyle='rgba(255,255,255,0.2)';cx.fillRect(bx+ox,by+oy,sw,3);
    cx.fillStyle='#fff';cx.fillRect(bx+ox+4,by+oy+4,7,7);cx.fillRect(bx+ox+sw-11,by+oy+4,7,7);
    cx.fillStyle='#111';cx.fillRect(bx+ox+6,by+oy+6,4,4);cx.fillRect(bx+ox+sw-9,by+oy+6,4,4);
    if(t<0.5){cx.fillStyle='#111';cx.fillRect(bx+ox+4,by+oy+3,5,2);cx.fillRect(bx+ox+sw-9,by+oy+3,5,2);}
  } else if(ti===1){
    // THE GEAR TITAN — giant spinning cog
    const gcx1=(bx+b.w/2)|0,gcy1=(by+b.h/2)|0;
    const gAng=bossTimer*0.03;
    const gCol=t<b.rAt?'#c87020':'#e6be85';
    cx.save();cx.shadowColor=gCol;cx.shadowBlur=22;cx.fillStyle='rgba(0,0,0,0)';cx.beginPath();cx.arc(gcx1,gcy1,17,0,Math.PI*2);cx.fill();cx.restore();
    cx.fillStyle='#2a1800';cx.beginPath();cx.arc(gcx1,gcy1,15,0,Math.PI*2);cx.fill();
    rotatingGear(gcx1,gcy1,14,8,gCol,gAng);
    cx.fillStyle='#3a2000';cx.beginPath();cx.arc(gcx1,gcy1,5.5,0,Math.PI*2);cx.fill();
    cx.save();cx.shadowColor='#ff8800';cx.shadowBlur=12;cx.fillStyle='#ff8800';cx.beginPath();cx.arc(gcx1,gcy1,3.5,0,Math.PI*2);cx.fill();cx.restore();
    cx.save();cx.translate(gcx1,gcy1);cx.rotate(gAng);
    cx.save();cx.shadowColor='#ffcc44';cx.shadowBlur=8;cx.fillStyle='#ff9900';cx.fillRect(-7,-4,4,4);cx.fillRect(3,-4,4,4);cx.fillStyle='#ffe080';cx.fillRect(-6,-3,2,2);cx.fillRect(4,-3,2,2);cx.restore();
    cx.restore();
    if(t<b.rAt){cx.save();cx.shadowColor='#ff4400';cx.shadowBlur=14;cx.strokeStyle='#ff6600';cx.lineWidth=1.5;cx.translate(gcx1,gcy1);cx.rotate(gAng);cx.beginPath();cx.moveTo(-2,-8);cx.lineTo(1,0);cx.lineTo(-3,6);cx.stroke();cx.restore();}
    if(b.telegraphTargets&&b.telegraphTargets.length&&b.telegraphTimer>0){
      const fy=currentRoom.plats.reduce((best,pl)=>pl[1]<225&&pl[1]>best?pl[1]:best,0)||224;
      if(Math.floor(sec()*8)%2){cx.save();cx.globalAlpha=0.8;cx.fillStyle='#ffd080';for(const tx of b.telegraphTargets)cx.fillRect(tx-14,fy-8,28,3);cx.restore();}
    }
  } else if(ti===2){
    // THE FROST GOLEM — chunky ice golem
    const igCol=t<b.rAt?'#2a6088':'#7ac8e8';
    cx.save();cx.shadowColor='#80d8ff';cx.shadowBlur=20;cx.fillStyle='rgba(0,0,0,0)';cx.beginPath();cx.arc(bx+b.w/2,by+b.h/2,18,0,Math.PI*2);cx.fill();cx.restore();
    cx.fillStyle=igCol;
    cx.fillRect(bx+0,by+7,7,8);cx.fillRect(bx+25,by+7,7,8);     // arms
    cx.fillRect(bx+5,by+6,22,12);                                  // torso
    cx.fillRect(bx+7,by+17,7,7);cx.fillRect(bx+18,by+17,7,7);    // legs
    cx.fillRect(bx+9,by,14,10);                                    // head
    cx.fillStyle='#c0e8ff';
    cx.fillRect(bx+14,by-6,4,7);cx.fillRect(bx+10,by-4,3,5);cx.fillRect(bx+19,by-4,3,5); // head spikes
    cx.fillRect(bx+1,by+3,3,5);cx.fillRect(bx+28,by+3,3,5);      // shoulder spikes
    cx.fillStyle='rgba(255,255,255,0.28)';
    cx.fillRect(bx+9,by,14,2);cx.fillRect(bx+5,by+6,22,2);cx.fillRect(bx+0,by+7,7,2);cx.fillRect(bx+25,by+7,7,2);
    cx.save();cx.shadowColor='#80d8ff';cx.shadowBlur=12;cx.fillStyle='#80d8ff';cx.fillRect(bx+10,by+2,4,5);cx.fillRect(bx+18,by+2,4,5);cx.restore();
    cx.fillStyle='#ffffff';cx.fillRect(bx+11,by+3,2,3);cx.fillRect(bx+19,by+3,2,3);
    if(t<b.rAt){
      cx.fillStyle='#1a2e40';cx.fillRect(bx+13,by+7,2,7);cx.fillRect(bx+20,by+8,2,5);cx.fillRect(bx+8,by+14,4,2);
      cx.save();cx.shadowColor='#a0e8ff';cx.shadowBlur=4;cx.fillStyle='rgba(160,232,255,0.6)';cx.fillRect(bx+13,by+7,1,4);cx.fillRect(bx+20,by+8,1,3);cx.restore();
    }
    if(b.telegraphTargets&&b.telegraphTargets.length&&b.telegraphTimer>0){
      if(Math.floor(sec()*8)%2){cx.save();cx.globalAlpha=0.8;cx.fillStyle='#80d8ff';for(const tx of b.telegraphTargets)cx.fillRect(tx-4,0,8,4);cx.restore();}
    }

function drawBossHUD(){
  if(!bossEntity)return;
  const b=bossEntity;
  const t=b.hp/b.maxHp;
  const barW=W-40;
  const col=t<=b.rAt?'#ff4444':THEMES[curTI()].accent;
  cx.fillStyle='#050508';cx.fillRect(20,10,barW,10);
  cx.fillStyle=col;cx.fillRect(20,10,Math.round(barW*t),10);
  cx.save();cx.shadowColor=col;cx.shadowBlur=8;
  cx.strokeStyle=col;cx.lineWidth=1;cx.strokeRect(20,10,barW,10);
  cx.restore();
  txtC(b.name,24,col);
}

function drawEnemies(theme){
  const sprites=ENEMY_SPRITES[curThemeKey()]||ENEMY_SPRITES.grasslands;
  const t=sec()*60;
  for(let i=0;i<enemies.length;i++){
    const e=enemies[i];
    const ex=Math.round(e.x),ey=Math.round(e.y);
    // EB-1: Burrowed — draw dirt mound instead
    if(e._burrowed){
      const mx=ex+Math.round(e.w/2)-2,ph2=Math.round(Math.sin(t*0.10)*1);
      cx.fillStyle='#3d2818';cx.fillRect(mx-2,224-2+ph2,4,2);
      continue;
    }
    if(e.stunTimer>0){cx.save();cx.globalAlpha=0.5;}
    // iframes flash (seraph revival)
    if(e.iframes>0&&Math.floor(sec()*12)%2===0){cx.save();cx.globalAlpha=0.4;cx.fillStyle='#ffd700';cx.fillRect(ex,ey,e.w,e.h);cx.restore();}
    sprites[i%2](ex,ey,t,i);
    if(e.stunTimer>0)cx.restore();
    // EB-3: Storm charge halo
    if(curTI()===3&&e._charge>0){cx.save();cx.globalAlpha=(e._charge/180)*0.7;cx.strokeStyle='#4fc3f7';cx.lineWidth=1;cx.strokeRect(ex-1,ey-1,e.w+2,e.h+2);cx.restore();}
    // HP bar (use maxHp so bar scales correctly after revival)
    const mhp=e.maxHp||2;
    if(e.hp>0&&e.hp<mhp){cx.fillStyle='#f44';cx.fillRect(ex+1,ey-3,e.w-2,2);cx.fillStyle='#4f4';cx.fillRect(ex+1,ey-3,Math.round((e.hp/mhp)*(e.w-2)),2);}
    // armor pips
    if(e.armor>0){cx.fillStyle='#888';for(let k=0;k<e.armor;k++)cx.fillRect(ex+1+k*4,ey-6,3,2);}
    // sawbot charge glow
    if(e.sawCharging){cx.save();cx.globalAlpha=0.5+0.3*Math.sin(t*0.4);cx.fillStyle='#ff9900';cx.fillRect(ex-1,ey-1,e.w+2,e.h+2);cx.restore();}
  }
}

    const slideIn=Math.min(1,progress*3);
    const slideOut=fr<12?fr/12:1;
    const yOff=Math.round((1-Math.min(slideIn,slideOut))*-24);
    const al=Math.min(slideIn,slideOut);

function updateIcicles(){
  if(curTI()!==2||!currentRoom.drops)return;
  icicleTimer++;
  if(icicleTimer%80===0){
    const src=pick(currentRoom.drops);
    icicles.push({x:src[0]+rng(-8,8),dropY:src[1],y:src[1],vy:0,warnTimer:55,active:false});
  }
  for(let i=icicles.length-1;i>=0;i--){
    const ic=icicles[i];
    if(!ic.active){
      ic.warnTimer--;
      if(ic.warnTimer<=0)ic.active=true;
      continue;
    }
    ic.vy=Math.min(ic.vy+0.35,12);
    ic.y+=ic.vy;
    // player hit
    if(p.iframes===0&&ov(ic.x-2,ic.y,5,10,p.x,p.y,PW,PH)){
      if(p.shieldUp){p.shieldUp=false;}else{run.hp--;}
      if(run.hp<=0){fadeTo(()=>{STATE='GAME_OVER';});}
      p.iframes=55;burst(p.x+PW/2,p.y+PH/2,'#c0e8ff',8);
      icicles.splice(i,1);continue;
    }
    // hit platform or floor
    const plats=getAllPlats();
    let shattered=ic.y>270;
    for(const [px,py,pw,ph] of plats){if(ic.y+10>py&&ic.y<py+ph&&ic.x>px&&ic.x<px+pw){shattered=true;break;}}
    if(shattered){burst(ic.x,ic.y,'#e0f8ff',6);icicles.splice(i,1);}
  }
}

  if(curTI()!==2)return;

  if(!exitOpen)return;
  if(ov(p.x,p.y,PW,PH,exitX-2,exitY-12,18,20)){

// ── Main update ────────────────────────────────────────────────────────────────
let last=0,urlChecked=false;
function update(ts){
  if(!urlChecked){
    urlChecked=true;
    const sp=new URLSearchParams(location.search);
    if(sp.has('w')){const wi=parseInt(sp.get('w'))||0;startTestRun(wi,sp.has('boss'));}
    else if(sp.has('boss')){startTestRun(0,true);}
  }
  const dt=Math.min((ts-last)/16.67,3);last=ts;

  if(STATE==='TRANSITION'){
    transitionAlpha+=0.06*transitionDir*dt;
    if(transitionAlpha>=1&&transitionDir===1){transitionAlpha=1;transitionDir=-1;transitionCallback&&transitionCallback();}
    else if(transitionAlpha<=0&&transitionDir===-1){transitionAlpha=0;STATE=prevState!=='TRANSITION'?prevState:'RUN';}
    drawFrame();requestAnimationFrame(update);return;
  }

  prevState=STATE;

  if(STATE==='OATH_TOOLTIP'){
    if(oathTooltipTimer>0)oathTooltipTimer--;
    if(oathTooltipTimer<=0){meta.firstRunWithOath=false;saveMeta();STATE='RUN';}
  }
  if(STATE==='RUN'){
    updateMovers();
    if(lavaY!==null&&!bossEntity)lavaY=Math.max(lavaY-0.16*dt,80);
    updateIcicles();
    updatePlayer();
    updateCamera();
    updateEnemies();
    updateBoss();
    updateProjectiles();
    updateEnemyProjs();
    updateHazards();
    updateDrops();
    updateParticles();
    checkExit();
    checkChest();
    // Elite room wave timer
    if(eliteWaveTimer>0){eliteWaveTimer--;if(eliteWaveTimer===0){spawnEliteWave2();eliteWave=2;}}
    // Elite room hazard spawner
    if(eliteHazardTimer>0&&eliteRoom&&!roomEnemiesCleared){eliteHazardTimer--;if(eliteHazardTimer===0){spawnEliteHazard();eliteHazardTimer=90;}}
    if(run.coins>=50)unlock('rich');

    if(run.upgrades.length>=5)unlock('upgrades_5');
    if(achievementPopup){achievementPopup.timer--;if(achievementPopup.timer<=0)achievementPopup=null;}
  }

  drawFrame();
  requestAnimationFrame(update);
}

function drawMenuBackground(t){
  // Night sky base
  cx.fillStyle='#08060f';cx.fillRect(0,0,W,H);

    cx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;cx.fillRect(sx,sy,1,1);
  }
  // 16 sparkle stars (brighter, pulsing)
  for(let i=0;i<16;i++){
    const sx=(hash(i*113+500)%W+W)%W,sy=(hash(i*97+300)%(H*0.65))|0;
    const a=0.5+0.4*Math.sin(t*2.5+i*1.1);

  cx.restore();
  cx.fillStyle='#08060f';cx.beginPath();cx.arc(259,34,12,0,Math.PI*2);cx.fill();
  // 3 nebula wisps
  const NEBULAS=[{x:62,y:68,r:34,col:'rgba(100,50,180,0.11)'},{x:208,y:44,r:27,col:'rgba(50,80,200,0.09)'},{x:108,y:208,r:22,col:'rgba(0,180,200,0.08)'}];
  for(const n of NEBULAS){const g=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,n.col);g.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=g;cx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);}

    if(phase<0.25){const prog=phase/0.25;const hx=s.ox+prog*180,hy=s.oy+prog*68;const fa=Math.sin(prog*Math.PI);
      for(let li=0;li<s.len;li++){const lf=li/s.len;cx.fillStyle=`rgba(255,255,255,${(fa*(1-lf)*0.85).toFixed(2)})`;cx.fillRect((hx-li*1.6)|0,(hy-li*0.62)|0,1,1);}
    }
  }
  // Ring clusters — 10 worlds arranged in an oval
  const RCX=160,RCY=148,RX=112,RY=100;
  for(let i=0;i<10;i++){
    const angle=-Math.PI/2+i*(Math.PI*2/10);

// ── Input dispatch ────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.code==='KeyM'&&STATE!=='MENU'){initAudio();toggleMute();return;}
  if(STATE==='MENU'){
    if(e.code==='Space'){
      newRun();initAudio();
      const def=pick(ROOM_POOLS.grasslands.filter(r=>r.type!=='boss'));
      fadeTo(()=>{loadRoom(def);startMusic(0);STATE='RUN';});
    }
    if(e.code==='KeyT'){warpIdx=0;STATE='WORLD_WARP';}
    if(e.code==='KeyS'){initAudio();settingsIdx=0;STATE='SETTINGS';}
    if(e.code==='KeyA'){STATE='ACHIEVEMENTS';}
    if(e.code==='KeyP'){perkSelected=0;STATE='PERK_SHOP';}
    if(e.code==='KeyM'){metaTreeSelected=0;STATE='META_TREE';}
  } else if(STATE==='WORLD_WARP'){
    if(e.code==='ArrowUp'||e.code==='KeyW')warpIdx=(warpIdx+THEMES.length-1)%THEMES.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')warpIdx=(warpIdx+1)%THEMES.length;
    if(e.code==='Space')startTestRun(warpIdx,false);
    if(e.code==='KeyB')startTestRun(warpIdx,true);
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='WEAPON_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')weaponSelected=(weaponSelected+weaponChoices.length-1)%weaponChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')weaponSelected=(weaponSelected+1)%weaponChoices.length;
    if(e.code==='Space'){
      const themeKey=curThemeKey();
      function _gotoRun(def){fadeTo(()=>{loadRoom(def);startMusic(curTI());if(meta.perks.includes('oath')&&meta.firstRunWithOath){oathTooltipTimer=300;STATE='OATH_TOOLTIP';}else STATE='RUN';});}
      if(pickingWeapon2){
        run.weapon2=weaponChoices[weaponSelected].id;pickingWeapon2=false;
        _gotoRun(pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss')));
      } else {
        run.weapon=weaponChoices[weaponSelected].id;
        if(run.weapon==='crossbow'||run.weapon==='boomerang')unlock('sharpshooter');
        if(run.weapon==='tome')unlock('arcane');
        _gotoRun(pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss')));
      }
    }
  } else if(STATE==='UPGRADE_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')upgradeSelected=(upgradeSelected+upgradeChoices.length-1)%upgradeChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')upgradeSelected=(upgradeSelected+1)%upgradeChoices.length;
    if(e.code==='Space'){
      const uid=upgradeChoices[upgradeSelected].id;
      run.upgrades.push(uid);
      if(uid==='max_hp'){run.maxHp+=2;run.hp+=2;}
      if(uid==='lance_titan'){run.maxHp+=2;run.hp=Math.min(run.hp+2,run.maxHp);}
      if(uid==='extra_dash')p.dashExtra=1;
      nextRoom();
    }
    if(e.code==='Escape')nextRoom();
  } else if(STATE==='SHOP_SCREEN'){
    if(e.code==='ArrowUp'||e.code==='KeyW')shopSelected=(shopSelected+shopItems.length-1)%shopItems.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')shopSelected=(shopSelected+1)%shopItems.length;
    if(e.code==='Space'){
      const it=shopItems[shopSelected];
      const canAfford=it.shard?run.shards>=it.cost:run.coins>=it.cost;
      if(canAfford){
        if(it.shard)run.shards-=it.cost;else{run.coins-=it.cost;if(meta.perks.includes('bargain'))perkFlash['bargain']=24;}
        if(it.id==='heal')run.hp=Math.min(run.hp+2,run.maxHp);
        if(it.id==='maxhp'){run.maxHp++;run.hp++;}
        if(it.id==='upgrade'){upgradeChoices=pickUpgrades(run.upgrades,run.weapon);upgradeSelected=0;STATE='UPGRADE_PICK';}
        if(it.id==='forge'){run.fusedWeapon=fusionKey(run.weapon,run.weapon2);sfx('upgrade');burst(W/2,H/2,FUSIONS[run.fusedWeapon]?.col||'#fff',20);}
      }
    }
    if(e.code==='Escape'){nextRoom();}
  } else if(STATE==='GAME_OVER'||STATE==='WIN'){
    if(e.code==='Space'){
      if(run.depth>meta.deepest){meta.deepest=run.depth;}
      meta.runs++;
      const _bankRate=hasSigil(9)?0.5:0.3; // pearl_coil: +20% banking
      meta.bankShards+=Math.floor(run.shards*_bankRate);
      saveMeta();
      stopMusic();STATE='MENU';
    }
  } else if(STATE==='SETTINGS'){
    const settKeys=['musicOn','sfxOn'];
    if(e.code==='ArrowUp'||e.code==='KeyW')settingsIdx=(settingsIdx+1)%settKeys.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')settingsIdx=(settingsIdx+settKeys.length-1)%settKeys.length;
    if(e.code==='Space'||e.code==='Enter'){
      const k=settKeys[settingsIdx];meta.settings[k]=!meta.settings[k];saveMeta();
      if(k==='musicOn'){if(meta.settings.musicOn)loopMusic('grasslands');else stopMusic();}
      if(k==='sfxOn'&&musicGain)musicGain.gain.value=meta.settings.sfxOn?meta.settings.musicVol:0;
    }
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='ACHIEVEMENTS'){
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='META_TREE'){
    if(e.code==='ArrowUp'||e.code==='KeyW')metaTreeSelected=(metaTreeSelected+META_COSMETICS.length-1)%META_COSMETICS.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')metaTreeSelected=(metaTreeSelected+1)%META_COSMETICS.length;
    if(e.code==='Space'){
      const mc=META_COSMETICS[metaTreeSelected];
      if(!hasCosmetic(mc.id)&&meta.bankShards>=mc.cost){
        meta.cosmeticUnlocks.push(mc.id);meta.bankShards-=mc.cost;saveMeta();sfx('upgrade');
      } else if(hasCosmetic(mc.id)){
        // re-equip: move to end so it becomes active
        meta.cosmeticUnlocks=meta.cosmeticUnlocks.filter(x=>x!==mc.id);
        meta.cosmeticUnlocks.push(mc.id);saveMeta();sfx('upgrade');
      }
    }
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='SHRINE_SCREEN'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')shrineSelected=(shrineSelected+shrineChoices.length-1)%shrineChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')shrineSelected=(shrineSelected+1)%shrineChoices.length;
    if(e.code==='Space'){
      const shCost=hasSigil(7)?0:meta.perks.includes('oath')?1:2;
      if(run.hp>shCost){
        run.hp-=shCost;
        const uid=shrineChoices[shrineSelected].id;
        run.upgrades.push(uid);
        if(uid==='max_hp'){run.maxHp+=2;}
        if(uid==='lance_titan'){run.maxHp+=2;run.hp=Math.min(run.hp,run.maxHp);}
        if(uid==='extra_dash')p.dashExtra=1;
        sfx('upgrade');
      }
      nextRoom();
    }
    if(e.code==='Escape')nextRoom();
  } else if(STATE==='OATH_TOOLTIP'){
    if(e.code==='Space'||e.code==='Escape'){meta.firstRunWithOath=false;saveMeta();oathTooltipTimer=0;STATE='RUN';}
  } else if(STATE==='PERK_SHOP'){
    if(e.code==='ArrowUp'||e.code==='KeyW')perkSelected=(perkSelected+PERKS.length-1)%PERKS.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')perkSelected=(perkSelected+1)%PERKS.length;
    if(e.code==='Space'){
      const pk=PERKS[perkSelected];
      if(!meta.perks.includes(pk.id)&&meta.bankShards>=pk.cost){
        meta.perks.push(pk.id);meta.bankShards-=pk.cost;if(pk.id==='oath')meta.firstRunWithOath=true;saveMeta();sfx('upgrade');
      }
    }
    if(e.code==='Escape')STATE='MENU';
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(update);});
</script>
