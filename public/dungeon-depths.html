  txtC('UP/DOWN=SELECT  ESC=BACK',H-12,'#444',1);
}

function drawUpgradePick(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  txtC('CHOOSE AN UPGRADE',20,'#ffd700',1);
  for(let i=0;i<upgradeChoices.length;i++){
    const u=upgradeChoices[i];
    const x=8+i*104,y=50,w=100,h=70;
    const sel=i===upgradeSelected;
    cx.fillStyle=sel?'#1a1a3a':'#111';cx.fillRect(x,y,w,h);
    cx.strokeStyle=sel?'#e040fb':'#333';cx.lineWidth=2;cx.strokeRect(x,y,w,h);
    txt(u.name,x+4,y+8,sel?'#e040fb':'#aaa');
    // wrap desc
    txt(u.desc,x+4,y+24,'#666');
    txt('['+u.cat+']',x+4,y+48,'#444');
  }
  txtC('LEFT/RIGHT TO BROWSE  SPACE TO PICK',245,'#555');
}

function drawWeaponPick(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=10;
  txtC(pickingWeapon2?'CHOOSE SECOND WEAPON':'CHOOSE YOUR WEAPON',16,'#ffd700');cx.restore();
  if(pickingWeapon2){txtC('FUSE AT THE SHOP WITH 5 SHARDS',26,'#555');}
  else{txtC('ALSO UNLOCKS DASH',26,'#555');}
  const n=weaponChoices.length;const cw=96;const gap=4;const totalW=n*cw+(n-1)*gap;const startX=(W-totalW)/2|0;
  for(let i=0;i<n;i++){
    const w=weaponChoices[i];
    const x=startX+i*(cw+gap),y=40,wh=150;
    const sel=i===weaponSelected;
    cx.fillStyle=sel?'#0d0d1f':'#0a0a0a';cx.fillRect(x,y,cw,wh);
    cx.strokeStyle=sel?w.col:'#333';cx.lineWidth=sel?2:1;cx.strokeRect(x,y,cw,wh);
    cx.save();if(sel){cx.shadowColor=w.col;cx.shadowBlur=10;}
    txt(w.name,x+4,y+8,sel?w.col:'#888',1);cx.restore();
    txt(w.desc,x+4,y+22,'#555');
    txt('Z/X TO ATTACK',x+4,y+34,'#444');
    txt('UPGRADES:',x+4,y+50,'#444');
    const pool=UPGRADE_POOL[w.id];
    for(let u=0;u<Math.min(pool.length,6);u++){
      txt(pool[u].name,x+3,y+60+u*14,sel?'#666':'#333');
    }
  }
  txtC('LEFT-RIGHT  SPACE TO CHOOSE',265,'#444');
}

function drawShop(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  txtC('SHOP',20,'#ffd700',2);
  cx.fillStyle='#ffd700';cx.fillRect(4,40,6,6);
  txt(String(run.coins),12,40,'#ffd700');
  for(let i=0;i<shopItems.length;i++){
    const it=shopItems[i];
    const x=8,y=60+i*50;
    const sel=i===shopSelected;
    const canAfford=it.shard?run.shards>=it.cost:run.coins>=it.cost;
    const cc=it.shard?'#e040fb':'#ffd700';
    cx.fillStyle=sel?'#1a1a2a':'#111';cx.fillRect(x,y,W-16,44);
    cx.strokeStyle=sel?(it.shard?'#e040fb':'#ffd700'):'#333';cx.lineWidth=1;cx.strokeRect(x,y,W-16,44);
    txt(it.name,x+4,y+6,canAfford?'#fff':'#444');
    txt(it.desc,x+4,y+18,'#666');
    cx.fillStyle=canAfford?cc:'#555';cx.fillRect(x+4,y+30,6,6);
    txt(String(it.cost)+(it.shard?' SH':''),x+12,y+30,canAfford?cc:'#555');
  }
  txtC('UP/DOWN  SPACE TO BUY  ESC TO LEAVE',268,'#555');
}

function drawGameOver(){
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);
  txtC('YOU DIED',120,'#f44',3);
  txtC('DEPTH REACHED: '+run.depth,162,'#aaa');
  txtC('PRESS SPACE TO RETRY',192,'#555');
}

function drawWin(){
  cx.fillStyle='rgba(0,0,0,0.8)';cx.fillRect(0,0,W,H);
  txtC('YOU WIN',120,'#ffd700',3);
  txtC('DEPTH REACHED: '+run.depth,162,'#aaa');
  txtC('PRESS SPACE FOR NEW RUN',192,'#555');
}

function drawAchievementPopup(){
  if(!achievementPopup)return;
  const pct=achievementPopup.timer/200;
  const slide=Math.min(1,(1-pct)*8);// slide in from bottom
  const y=Math.round(H-38+Math.max(0,(1-slide)*36));
  const alpha=Math.min(1,pct*8)*Math.min(1,(1-pct)*6);
  if(alpha<=0)return;
  cx.save();cx.globalAlpha=alpha;
  cx.fillStyle='rgba(8,8,18,0.92)';cx.fillRect(4,y,W-8,34);
  cx.strokeStyle='#ffd700';cx.lineWidth=1;cx.strokeRect(4,y,W-8,34);
  cx.fillStyle='#ffd700';cx.fillRect(8,y+4,4,4);
  txt('ACHIEVEMENT UNLOCKED',16,y+3,'#ffd700');
  txt(achievementPopup.name,8,y+13,'#fff');
  txt(achievementPopup.desc,8,y+23,'#888');
  cx.restore();
}

function drawSettings(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  cx.save();cx.shadowColor='#90caf9';cx.shadowBlur=10;txtC('SETTINGS',20,'#90caf9',2);cx.restore();
  const items=[
    {label:'MUSIC',val:meta.settings.musicOn?'ON':'OFF',key:'musicOn'},
    {label:'SFX',  val:meta.settings.sfxOn  ?'ON':'OFF',key:'sfxOn'},
  ];
  for(let i=0;i<items.length;i++){
    const it=items[i];const y=80+i*40;
    cx.fillStyle='#111';cx.fillRect(20,y,W-40,30);
    cx.strokeStyle='#333';cx.lineWidth=1;cx.strokeRect(20,y,W-40,30);
    txt(it.label,28,y+10,'#aaa');
    const vc=it.val==='ON'?'#4fc3f7':'#555';
    txt(it.val,W-28-txtW(it.val),y+10,vc);
  }
  txtC('SPACE TO TOGGLE  ESC TO CLOSE',268,'#444');
}

let settingsIdx=0;
function drawAchievements(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);
  cx.save();cx.shadowColor='#ffd700';cx.shadowBlur=10;txtC('ACHIEVEMENTS',16,'#ffd700',2);cx.restore();
  const cols=2,rows=6,cw=W/cols-8;
  for(let i=0;i<ACHIEVEMENTS.length;i++){
    const a=ACHIEVEMENTS[i];const unlocked=meta.achievements.includes(a.id);
    const col=i%cols,row=Math.floor(i/cols);
    const x=4+col*(cw+8),y=38+row*40,w=cw,h=36;
    cx.fillStyle=unlocked?'#0d0d1f':'#0a0a0a';cx.fillRect(x,y,w,h);
    cx.strokeStyle=unlocked?'#ffd700':'#333';cx.lineWidth=1;cx.strokeRect(x,y,w,h);
    txt(a.name,x+4,y+5,unlocked?'#ffd700':'#444');
    txt(a.desc,x+4,y+17,unlocked?'#666':'#333');
    if(unlocked){cx.fillStyle='#ffd700';cx.fillRect(x+w-8,y+4,4,4);}
  }
  txt('UNLOCKED: '+meta.achievements.length+'/'+ACHIEVEMENTS.length,8,H-10,'#555');
  txtC('ESC TO CLOSE',H-10,'#333');
}

// ── Input dispatch ────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(STATE==='MENU'){
    if(e.code==='Space'){
      newRun();initAudio();
      const def=pick(ROOM_POOLS.grasslands.filter(r=>r.type!=='boss'));
      fadeTo(()=>{loadRoom(def);startMusic(0);STATE='RUN';});
    }
    if(e.code==='KeyT'){warpIdx=0;STATE='WORLD_WARP';}
    if(e.code==='KeyS'){initAudio();settingsIdx=0;STATE='SETTINGS';}
    if(e.code==='KeyA'){STATE='ACHIEVEMENTS';}
  } else if(STATE==='WORLD_WARP'){
    if(e.code==='ArrowUp'||e.code==='KeyW')warpIdx=(warpIdx+THEMES.length-1)%THEMES.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')warpIdx=(warpIdx+1)%THEMES.length;
    if(e.code==='Space')startTestRun(warpIdx,false);
    if(e.code==='KeyB')startTestRun(warpIdx,true);
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='WEAPON_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')weaponSelected=(weaponSelected+weaponChoices.length-1)%weaponChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')weaponSelected=(weaponSelected+1)%weaponChoices.length;
    if(e.code==='Space'){
      const themeKey=curThemeKey();
      if(pickingWeapon2){
        run.weapon2=weaponChoices[weaponSelected].id;pickingWeapon2=false;
        const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
        fadeTo(()=>{loadRoom(def);startMusic(curTI());STATE='RUN';});
      } else {
        run.weapon=weaponChoices[weaponSelected].id;
        if(run.weapon==='crossbow'||run.weapon==='boomerang')unlock('sharpshooter');
        if(run.weapon==='tome')unlock('arcane');
        const def=pick(ROOM_POOLS[themeKey].filter(r=>r.type!=='boss'));
        fadeTo(()=>{loadRoom(def);startMusic(curTI());STATE='RUN';});
      }
    }
  } else if(STATE==='UPGRADE_PICK'){
    if(e.code==='ArrowLeft'||e.code==='KeyA')upgradeSelected=(upgradeSelected+upgradeChoices.length-1)%upgradeChoices.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')upgradeSelected=(upgradeSelected+1)%upgradeChoices.length;
    if(e.code==='Space'){
      const uid=upgradeChoices[upgradeSelected].id;
      run.upgrades.push(uid);
      if(uid==='max_hp'){run.maxHp+=2;run.hp+=2;}
      if(uid==='extra_dash')p.dashExtra=1;
      nextRoom();
    }
    if(e.code==='Escape')nextRoom();
  } else if(STATE==='SHOP_SCREEN'){
    if(e.code==='ArrowUp'||e.code==='KeyW')shopSelected=(shopSelected+shopItems.length-1)%shopItems.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')shopSelected=(shopSelected+1)%shopItems.length;
    if(e.code==='Space'){
      const it=shopItems[shopSelected];
      const canAfford=it.shard?run.shards>=it.cost:run.coins>=it.cost;
      if(canAfford){
        if(it.shard)run.shards-=it.cost;else run.coins-=it.cost;
        if(it.id==='heal')run.hp=Math.min(run.hp+2,run.maxHp);
        if(it.id==='maxhp'){run.maxHp++;run.hp++;}
        if(it.id==='upgrade'){upgradeChoices=pickUpgrades(run.upgrades,run.weapon);upgradeSelected=0;STATE='UPGRADE_PICK';}
        if(it.id==='forge'){run.fusedWeapon=fusionKey(run.weapon,run.weapon2);sfx('upgrade');burst(W/2,H/2,FUSIONS[run.fusedWeapon]?.col||'#fff',20);}
      }
    }
    if(e.code==='Escape'){nextRoom();}
  } else if(STATE==='GAME_OVER'||STATE==='WIN'){
    if(e.code==='Space'){
      if(run.depth>meta.deepest){meta.deepest=run.depth;saveMeta();}
      meta.runs++;saveMeta();
      stopMusic();STATE='MENU';
    }
  } else if(STATE==='SETTINGS'){
    const settKeys=['musicOn','sfxOn'];
    if(e.code==='ArrowUp'||e.code==='KeyW')settingsIdx=(settingsIdx+1)%settKeys.length;
    if(e.code==='ArrowDown'||e.code==='KeyS')settingsIdx=(settingsIdx+settKeys.length-1)%settKeys.length;
    if(e.code==='Space'||e.code==='Enter'){
      const k=settKeys[settingsIdx];meta.settings[k]=!meta.settings[k];saveMeta();
      if(k==='musicOn'){if(meta.settings.musicOn)loopMusic('grasslands');else stopMusic();}
      if(k==='sfxOn'&&musicGain)musicGain.gain.value=meta.settings.sfxOn?meta.settings.musicVol:0;
    }
    if(e.code==='Escape')STATE='MENU';
  } else if(STATE==='ACHIEVEMENTS'){
    if(e.code==='Escape')STATE='MENU';
  }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
requestAnimationFrame(ts=>{last=ts;requestAnimationFrame(update);});
</script>
